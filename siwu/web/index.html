              <p className="text-xs text-warmgray mt-4">以毛泽东思想方法论为认知内核的 AI 智能体<br/>首次使用，请配置 LLM 连接</p>
            </div>
            <div className="bg-cream border border-linen/50 rounded-xl p-6 space-y-5 shadow-lg">
              <div><label className="block text-xs font-semibold text-warmgray mb-2 uppercase">服务商</label>
                <div className="flex flex-wrap gap-2">
                  {Object.entries(PROVIDERS).map(([k,v]) => (
                    <button key={k} onClick={() => handleProviderChange(k)} className={'px-3 py-1.5 rounded-full text-xs font-medium transition-colors ' + (provider===k ? 'bg-seal text-white' : 'bg-paper border border-clay/40 text-warmgray hover:border-seal/40')}>{v.label}</button>
                  ))}
                </div>
              </div>
              <div><label className="block text-xs font-semibold text-warmgray mb-1.5 uppercase">Base URL</label>
                <input value={baseUrl} onChange={e=>setBaseUrl(e.target.value)} onKeyDown={e => handleTabFill(e, baseUrl, setBaseUrl)} placeholder="https://api.deepseek.com" className="w-full bg-paper border border-linen/60 rounded-lg px-4 py-2.5 text-sm text-ink placeholder:text-clay focus:outline-none focus:border-seal/50 focus:ring-1 focus:ring-seal/20" /></div>
              <div><label className="block text-xs font-semibold text-warmgray mb-1.5 uppercase">API Key</label>
                <div className="relative">
                  <input type={showKey?'text':'password'} value={apiKey} onChange={e=>{setApiKey(e.target.value);setError('');}} placeholder="sk-…" className="w-full bg-paper border border-linen/60 rounded-lg px-4 py-2.5 pr-10 text-sm text-ink placeholder:text-clay focus:outline-none focus:border-seal/50 focus:ring-1 focus:ring-seal/20" />
                  <button onClick={()=>setShowKey(!showKey)} className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-warmgray hover:text-seal">{showKey?'🙈':'👁'}</button>
                </div>
              </div>
              <div><label className="block text-xs font-semibold text-warmgray mb-1.5 uppercase">Model</label>
                <input value={model} onChange={e=>setModel(e.target.value)} onKeyDown={e => handleTabFill(e, model, setModel)} placeholder="deepseek-v4-pro" className="w-full bg-paper border border-linen/60 rounded-lg px-4 py-2.5 text-sm text-ink placeholder:text-clay focus:outline-none focus:border-seal/50 focus:ring-1 focus:ring-seal/20" /></div>
              {error && <div className="text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg px-4 py-2.5">{error}</div>}
              <button onClick={handleSave} disabled={saving||!apiKey.trim()} className="w-full py-3 rounded-lg bg-seal text-white text-sm font-semibold hover:bg-seal-light transition-colors disabled:opacity-40 disabled:cursor-not-allowed">{saving?'保存中…':'✓ 保存并进入'}</button>
              <p className="text-[10px] text-warmgray/60 text-center">配置将写入 config.toml，密钥仅存储于本地</p>
            </div>
          </div>
        </div>
      );
    }

    // ── App ──────────────────────────────────────────────────
    function App() {
      const [activeConvId, setActiveConvId] = useState(() => {
        try { return JSON.parse(localStorage.getItem(LS_KEY))?.lastConvId || ''; } catch { return ''; }
      });
      const [turns, setTurns] = useState([]);
      const [devMode, setDevMode] = useState(() => {
        try { return JSON.parse(localStorage.getItem('siwu_dev_mode')) === true; }
        catch { return false; }
      });
      const [showSettings, setShowSettings] = useState(false);
      const [workspaceDir, setWorkspaceDir] = useState('');
      const [uiSettings, setUiSettings] = useState({ font_family: 'system', font_size: 'medium', page_zoom: 100, show_thinking_after_answer: true, agent_persona: '', custom_knowledge: '' });
      const [animTitleId, setAnimTitleId] = useState(null);  // conversation id that just got a title
      const [selectedModel, setSelectedModel] = useState(() => { try { return localStorage.getItem('siwu_selected_model') || '智能路由'; } catch { return '智能路由'; } });
      const [availableModels, setAvailableModels] = useState(['智能路由']);
      const [projects, setProjects] = useState([]);
      const [activeProjectId, setActiveProjectId] = useState(() => { try { return JSON.parse(localStorage.getItem(LS_KEY))?.activeProjectId || ''; } catch { return ''; } });

      // ── File upload (lifted to App for page-wide drag-and-drop) ──
      const [files, setFiles] = useState([]);
      const [uploading, setUploading] = useState(false);
      const [dragOver, setDragOver] = useState(false);
      const dragCounterRef = useRef(0);

      const handleFiles = useCallback(async (fileList) => {
        const arr = Array.from(fileList || []);
        if (!arr.length) return;
        setUploading(true);
        for (const f of arr) {
          try {
            const fd = new FormData();
            fd.append('file', f);
            fd.append('project_id', activeProjectIdRef.current || '');
            const r = await fetch('/api/v1/agent/upload-file', { method: 'POST', body: fd });
            const data = await r.json();
            if (r.ok && data.file_path) setFiles(prev => [...prev, { name: data.file_name || f.name, path: data.file_path }]);
          } catch (e) { console.error('[upload] error:', e); }
        }
        setUploading(false);
      }, []);

      const handleDragOver = useCallback((e) => {
        e.preventDefault(); e.stopPropagation();
      }, []);
      const handleDragEnter = useCallback((e) => {
        e.preventDefault(); e.stopPropagation();
        dragCounterRef.current += 1;
        setDragOver(true);
      }, []);
      const handleDragLeave = useCallback((e) => {
        e.preventDefault(); e.stopPropagation();
        dragCounterRef.current -= 1;
        if (dragCounterRef.current <= 0) { dragCounterRef.current = 0; setDragOver(false); }
      }, []);
      const handleDrop = useCallback((e) => {
        e.preventDefault(); e.stopPropagation();
        dragCounterRef.current = 0;
        setDragOver(false);
        const dt = e.dataTransfer;
        if (dt && dt.files && dt.files.length) handleFiles(dt.files);
      }, [handleFiles]);

      // Phase tracking for the current in-progress turn
      const [activePhase, setActivePhase] = useState(null);
      const [completedPhases, setCompletedPhases] = useState(() => new Set());
      const [phaseLogs, setPhaseLogs] = useState([]);
      const [clarify, setClarify] = useState(null);  // { convId, questions } | null —— 智能体主动提问（澄清）

      const { list, setList: setListDirect, refresh, create, rename, remove, loadTurns } = useConversations();
      const { runningConvs, start, stop, attach } = useSSE();
      const running = runningConvs.has(activeConvId);
      const stopCurrent = useCallback(async () => {
        const cid = activeConvRef.current;
        if (!cid) return;
        // 1. 通知后端终止认知循环
        try {
          await fetch('/api/v1/agent/control', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ conversation_id: cid, action: 'stop' }),
          });
        } catch (e) { console.error('[stop] control API error:', e); }
        // 2. 关闭 SSE 连接
        stop(cid);
      }, [stop]);
      const handleSteer = useCallback(async (content) => {
        const cid = activeConvRef.current;
        if (!cid) { console.warn('[steer] no active conversation, ignoring'); return; }
        try {
          const r = await fetch('/api/v1/agent/control', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ conversation_id: cid, action: 'steer', content }),
          });
          if (!r.ok) {
            const d = await r.json();
            console.warn('[steer] failed:', d.detail);
          } else {
            console.log('[steer] sent to', cid, ':', content.slice(0, 60));
          }
        } catch (e) { console.error('[steer] error:', e); }
      }, []);
      const submitAnswer = useCallback(async (answer) => {
        const cid = activeConvRef.current;
        if (!cid) return;
        try {
          await fetch('/api/v1/agent/control', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ conversation_id: cid, action: 'answer', content: answer || '' }),
          });
        } catch (e) { console.error('[answer] error:', e); }
        setClarify(null);
      }, []);
      const store = useLocalStore();
      const chatRef = useRef(null);

      // Refs to keep async callbacks fresh without re-creating handleSend
      const activeConvRef = useRef(activeConvId);
      activeConvRef.current = activeConvId;
      const turnsRef = useRef(turns);
      turnsRef.current = turns;
      // Ref directly updated in onPhase (NOT via render) to avoid React batching race
      const capturedPhaseLogsRef = useRef([]);
      const runningRef = useRef(running);
      runningRef.current = running;
      const renameRef = useRef(rename);
      renameRef.current = rename;
      const refreshRef = useRef(refresh);
      refreshRef.current = refresh;
      const activeProjectIdRef = useRef(activeProjectId);
      activeProjectIdRef.current = activeProjectId;
      const prevActiveConvIdRef = useRef('');
      // Track whether we're mid-send (programmatic setActiveConvId from handleSend)
      const sendingRef = useRef(false);
      // Cache conversation UI state for background-running conversations
      const convStateCacheRef = useRef({});
      const recoveryTimerRef = useRef(null);

      // Load conversation list（按当前项目筛选）——挂载 + 项目切换时刷新
      useEffect(() => { refresh(activeProjectId); }, [activeProjectId, refresh]);

      // Load projects（项目列表 + 当前项目的工作空间目录）
      const refreshProjects = useCallback(async () => {
        try {
          const r = await fetch('/api/v1/projects');
          const data = await r.json();
          const ps = data?.projects || [];
          setProjects(ps);
          return ps;
        } catch { return []; }
      }, []);
      useEffect(() => { refreshProjects(); }, [refreshProjects]);
      // 工作空间目录跟随当前项目
      useEffect(() => {
        const p = projects.find(x => x.id === activeProjectId) || projects[0];
        if (p && p.workspace_dir) setWorkspaceDir(p.workspace_dir);
      }, [projects, activeProjectId]);

      // Load available models
      useEffect(() => {
        fetch('/api/v1/models').then(r => r.json()).then(data => {
          if (data?.models?.length) {
            setAvailableModels(data.models);
            // If current selection is not in the list, fall back to 智能路由
            setSelectedModel(prev => data.models.includes(prev) ? prev : '智能路由');
          }
        }).catch(() => {});
      }, []);

      // Load & apply UI settings (font, persona)
      // Phase 1: localStorage instant (no flash on refresh)
      // Phase 2: server (authoritative)
      useEffect(() => {
        try {
          const cached = JSON.parse(localStorage.getItem('siwu_ui_settings'));
          if (cached) {
            setUiSettings(cached);
            const cfa = FONT_FAMILIES.find(x => x.id === cached.font_family);
            const cfs = FONT_SIZES.find(x => x.id === cached.font_size);
            document.documentElement.style.setProperty('--app-font', (cfa || FONT_FAMILIES[0]).css);
            document.documentElement.style.setProperty('--app-font-size', (cfs || FONT_SIZES[1]).css);
            if (cached.page_zoom) document.body.style.zoom = (cached.page_zoom / 100).toString();
          }
        } catch {}
        fetch('/api/v1/settings').then(r => r.json()).then(d => {
          setUiSettings(d);
          try { localStorage.setItem('siwu_ui_settings', JSON.stringify(d)); } catch {}
          const fa = FONT_FAMILIES.find(x => x.id === d.font_family);
          const fs = FONT_SIZES.find(x => x.id === d.font_size);
          document.documentElement.style.setProperty('--app-font', (fa || FONT_FAMILIES[0]).css);
          document.documentElement.style.setProperty('--app-font-size', (fs || FONT_SIZES[1]).css);
          if (d.page_zoom) document.body.style.zoom = (d.page_zoom / 100).toString();
        }).catch(() => {});
      }, []);

      // Load turns when switching conversations
      useEffect(() => {
        const prevId = prevActiveConvIdRef.current;
        prevActiveConvIdRef.current = activeConvId;
        // Save state of conversation we're leaving (if running)
        if (prevId && prevId !== activeConvId && runningConvs.has(prevId)) {
          convStateCacheRef.current[prevId] = {
            turns: turnsRef.current,
            phaseLogs: [...phaseLogs],
            activePhase,
            completedPhases: new Set(completedPhases),
          };
        }
        if (!activeConvId) return;
        if (sendingRef.current) return;
        if (recoveryTimerRef.current) return;  // recovery polling is active
        store.save({ lastConvId: activeConvId });
        // Restore from cache if this conversation is running in background
        const cached = convStateCacheRef.current[activeConvId];
        if (cached && runningConvs.has(activeConvId)) {
          setTurns(cached.turns);
          setPhaseLogs(cached.phaseLogs);
          setActivePhase(cached.activePhase);
          setCompletedPhases(cached.completedPhases);
          return;
        }
        // Otherwise load from DB
        loadTurns(activeConvId).then(historyTurns => {
          const lastTurn = historyTurns[historyTurns.length - 1];
          if (lastTurn && lastTurn.summary === '[...]') {
            // In-progress turn — recovery effect handles it
            return;
          }
          // Filter out placeholder entries ([...]) — they're internal markers
          const cleanTurns = historyTurns.filter(t => t.summary !== '[...]');
          setTurns(cleanTurns.map(t => ({ type: 'history', question: t.question, summary: t.summary, action_items: t.action_items || [], files: [] })));
          setPhaseLogs([]); setActivePhase(null); setCompletedPhases(new Set());
        });
      }, [activeConvId]);

      // ── Post-refresh recovery: SSE reconnection (pub/sub), fallback to polling ──
      useEffect(() => {
        if (recoveryTimerRef.current) { clearInterval(recoveryTimerRef.current); recoveryTimerRef.current = null; }
        if (!activeConvId) return;
        loadTurns(activeConvId).then(async historyTurns => {
          const lastTurn = historyTurns[historyTurns.length - 1];
          if (!lastTurn || lastTurn.summary !== '[...]') return;

          const historyEntries = historyTurns.slice(0, -1).map(t => ({ type: 'history', question: t.question, summary: t.summary, action_items: t.action_items || [], files: [] }));
          const recoveringConvId = activeConvId;

          const startPolling = () => {
            console.log('[recovery] polling for in-progress turn completion');
            setTurns([...historyEntries, { type: 'recovering', question: '正在恢复思考进度...', summary: '', actions: [], files: [] }]);
            let attempts = 0;
            const poll = () => {
              attempts++;
              if (attempts > 40) {  // ~2 minutes max (40 * 3s)
                clearInterval(recoveryTimerRef.current);
                recoveryTimerRef.current = null;
                // Give up — show whatever history we have, clean up the stuck turn
                console.log('[recovery] polling gave up after', attempts, 'attempts');
                setTurns([...historyEntries, { type: 'history', question: lastTurn?.question || '(恢复超时)', summary: '**会话恢复超时**\n\n后台响应超过 2 分钟，已停止等待。你可以新建对话或重新提问。', action_items: [], files: [] }]);
                setPhaseLogs([]);
                refreshRef.current(activeProjectIdRef.current);
                return;
              }
              loadTurns(recoveringConvId).then(fresh => {
                const last = fresh[fresh.length - 1];
                if (last && last.summary !== '[...]') {
                  console.log('[recovery] backend finished via polling');
                  clearInterval(recoveryTimerRef.current);
                  recoveryTimerRef.current = null;
                  const clean = fresh.filter(t => t.summary !== '[...]');
                  setTurns(clean.map(t => ({ type: 'history', question: t.question, summary: t.summary, action_items: t.action_items || [], files: [] })));
                  setPhaseLogs([]);
                  refreshRef.current(activeProjectIdRef.current);
                }
              });
            };
            recoveryTimerRef.current = setInterval(poll, 3000);
          };

          // Step 1: Try SSE reconnection via pub/sub architecture
          try {
            const statusRes = await fetch('/api/v1/agent/run/status/' + encodeURIComponent(recoveringConvId));
            const status = await statusRes.json();
            if (status.status === 'running') {
              console.log('[recovery] SSE stream alive for', recoveringConvId, '— attaching');
              setTurns([...historyEntries, { type: 'turn', question: lastTurn.question, running: true, summary: '', actions: [], files: [] }]);
              setPhaseLogs([]); setActivePhase(null); setCompletedPhases(new Set());
              capturedPhaseLogsRef.current = [];
              attach(recoveringConvId, {
                onPhase: (phase, summary, data) => {
                  if (activeConvRef.current !== recoveringConvId) return;
                  const cleanedSummary = cleanPromptLeakage(summary);
                  const entry = { phase, summary: cleanedSummary, data };
                  const replace = (prev) => phase === 'preprocessing' ? [...prev, entry] : [...prev.filter(e => e.phase !== phase), entry];
                  capturedPhaseLogsRef.current = replace(capturedPhaseLogsRef.current);
                  setActivePhase(phase);
                  setCompletedPhases(prev => new Set([...prev, phase]));
                  setPhaseLogs(prev => replace(prev));
                },
                onClarification: (questions) => {
                  setClarify({ convId: recoveringConvId, questions: questions || [] });
                },
                onDone: (result) => {
                  if (recoveryTimerRef.current) { clearInterval(recoveryTimerRef.current); recoveryTimerRef.current = null; }
                  setActivePhase(null);
                  setClarify(prev => (prev && prev.convId === recoveringConvId) ? null : prev);
                  if (result.error === 'attach_failed') { startPolling(); return; }
                  const rawSummary = result.error ? '**运行出错**\n\n' + result.error : (result.summary || '');
                  const summary = cleanPromptLeakage(rawSummary);
                  const actions = result.error ? [] : (result.action_items || []);
                  const finalPhaseLogs = [...capturedPhaseLogsRef.current];
                  capturedPhaseLogsRef.current = [];
                  setTurns(prev => prev.map((t, i) => i === prev.length - 1 ? { ...t, running: false, summary, actions, phaseLogs: finalPhaseLogs } : t));
                  setPhaseLogs([]);
                  refreshRef.current(activeProjectIdRef.current);
                },
              });
              return; // SSE attached — skip polling
            }
          } catch (e) { console.log('[recovery] SSE status check failed:', e); }

          // Step 2: Fallback to polling
          startPolling();
        });
        return () => { if (recoveryTimerRef.current) { clearInterval(recoveryTimerRef.current); recoveryTimerRef.current = null; } };
      }, [activeConvId]);

      // Auto-create conversation if none selected
      // Also inject activeConvId into list if it's missing (e.g. after refresh failure)
      const stuckRecoveryRef = useRef(null);
      useEffect(() => {
        if (!activeConvId) {
          if (list.length === 0) return;
          const firstId = list[0]?.id;
          if (firstId) setActiveConvId(firstId);
          return;
        }
        // activeConvId is set — ensure it appears in sidebar
        if (list.length === 0) {
          // List is empty (API may have failed) — inject a minimal entry
          setListDirect([{ id: activeConvId, name: '(加载中…)', question_count: 0, last_active: new Date().toISOString() }]);
        } else if (!list.find(c => c.id === activeConvId)) {
          // activeConvId not in loaded list — inject it at top
          setListDirect(prev => [{ id: activeConvId, name: '(恢复中…)', question_count: 0, last_active: new Date().toISOString() }, ...prev]);
        }

        // If recovery state persists > 12s with no turns loaded, clear the injection
        // so the user sees the normal welcome screen instead of being stuck forever.
        const isRecovering = list.some(c => c.id === activeConvId && (c.name === '(加载中…)' || c.name === '(恢复中…)'));
        if (isRecovering) {
          if (stuckRecoveryRef.current) clearTimeout(stuckRecoveryRef.current);
          stuckRecoveryRef.current = setTimeout(() => {
            // If turns still empty after 12s, remove the injected entry
            setListDirect(prev => prev.filter(c => !(c.id === activeConvId && (c.name === '(加载中…)' || c.name === '(恢复中…)'))));
            // Clear stuck conversation from localStorage so next refresh doesn't repeat
            try {
              const s = JSON.parse(localStorage.getItem(LS_KEY)) || {};
              if (s.lastConvId === activeConvId) { s.lastConvId = ''; localStorage.setItem(LS_KEY, JSON.stringify(s)); }
            } catch {}
            // Clear activeConvId so the welcome screen shows
            setActiveConvId('');
            // Also stop any polling
            if (recoveryTimerRef.current) { clearInterval(recoveryTimerRef.current); recoveryTimerRef.current = null; }
            console.log('[recovery] timed out after 12s — cleared stuck recovery state');
          }, 12000);
        }
        return () => { if (stuckRecoveryRef.current) clearTimeout(stuckRecoveryRef.current); };
      }, [list, activeConvId, setListDirect]);

      // Auto-scroll to bottom
      useEffect(() => {
        if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
      }, [turns, phaseLogs]);

      const handleSend = useCallback((question, context, mode, reviewStrategy, model, files) => {
        console.log('[handleSend] activeConvRef.current:', activeConvRef.current, 'turns.length:', turnsRef.current.length);
        let cid = activeConvRef.current;
        // Prevent double-send on a conversation that's already running
        if (cid && runningConvs.has(cid)) {
          console.log('[handleSend] conv already running, skipping:', cid);
          return;
        }
        sendingRef.current = true;
        const ensureConv = async () => {
          if (!cid) {
            cid = await create(question.slice(0,24), activeProjectIdRef.current);
            console.log('[handleSend] created new conv:', cid);
            // Optimistic: insert into sidebar list before refresh completes
            const optimisticEntry = { id: cid, name: question.slice(0, 24), question_count: 0, last_active: new Date().toISOString() };
            setListDirect(prev => [optimisticEntry, ...prev]);
            setActiveConvId(cid);
          } else {
            setActiveConvId(cid);
          }
          // Add user bubble
          const turnIdx = turnsRef.current.length;
          const fileInfos = (files || []).map(f => typeof f === 'string' ? { name: f, path: f } : f);
          const filePaths = fileInfos.map(f => f.path);
          setTurns(prev => [...prev, { type: 'turn', question, context, mode, reviewStrategy, running: true, summary: '', actions: [], files: fileInfos }]);
          setPhaseLogs([]); setActivePhase(null); setCompletedPhases(new Set());
          capturedPhaseLogsRef.current = [];  // reset for new turn
          // Release guard now that turns are set
          sendingRef.current = false;

          // Flush React render (sidebar entry + user bubble) before SSE events arrive
          await new Promise(r => setTimeout(r, 30));

          start(question, context, mode, cid, reviewStrategy, model, activeProjectIdRef.current, filePaths, {
            onPhase: (phase, summary, data) => {
              const cleanedSummary = cleanPromptLeakage(summary);
              // 替换同阶段旧条目（"正在..."占位 → 完成结果）
              // 预处理例外：保留两条（意图分析 → 意图结果），turns 静止时前端独立展示
              const entry = { phase, summary: cleanedSummary, data };
              const replace = (prev) => phase === 'preprocessing' ? [...prev, entry] : [...prev.filter(e => e.phase !== phase), entry];
              capturedPhaseLogsRef.current = replace(capturedPhaseLogsRef.current);
              // Always update cache (for background-switch recovery)
              const cache = convStateCacheRef.current[cid] || { turns: turnsRef.current, phaseLogs: [], activePhase: null, completedPhases: new Set() };
              cache.activePhase = phase;
              cache.completedPhases = new Set([...cache.completedPhases, phase]);
              cache.phaseLogs = replace(cache.phaseLogs);
              convStateCacheRef.current[cid] = cache;
              // Only update UI if this conv is frontmost
              if (activeConvRef.current !== cid) return;
              setActivePhase(phase);
              setCompletedPhases(prev => new Set([...prev, phase]));
              setPhaseLogs(prev => replace(prev));
            },
            onDone: (result) => {
              const isActive = activeConvRef.current === cid;
              if (isActive) setActivePhase(null);
              setClarify(prev => (prev && prev.convId === cid) ? null : prev);
              const rawSummary = result.error
                ? '**运行出错**\n\n' + result.error
                : (result.summary || '');
              const summary = cleanPromptLeakage(rawSummary);
              const actions = result.error ? [] : (result.action_items || []);
              const generatedFiles = result.error ? [] : (result.generated_files || []);
              // Capture phase logs from the direct ref (always fresh, no React batching race)
              const finalPhaseLogs = [...capturedPhaseLogsRef.current];
              capturedPhaseLogsRef.current = [];
              setTurns(prev => {
                const copy = [...prev];
                if (copy[turnIdx]) copy[turnIdx] = { ...copy[turnIdx], running: false, summary, actions, generatedFiles, phaseLogs: finalPhaseLogs };
                return copy;
              });
              // Also update cache for background-switch recovery
              if (convStateCacheRef.current[cid]) {
                convStateCacheRef.current[cid].turns = convStateCacheRef.current[cid].turns.map((t, i) =>
                  i === turnIdx ? { ...t, running: false, summary, actions, generatedFiles, phaseLogs: finalPhaseLogs } : t
                );
              }
              // Trigger MathJax if this conv is active
              if (isActive) {
                setTimeout(() => {
                  if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise();
                  }
                }, 100);
              }
              refreshRef.current(activeProjectIdRef.current);  // always refresh list (question_count, etc.)
            },
            onClarification: (questions) => {
              setClarify({ convId: cid, questions: questions || [] });
            },
            onTitle: (title, cid) => {
              console.log('[onTitle] title:', title, 'cid:', cid);
              if (cid) {
                renameRef.current(cid, title);  // use ref to ensure latest rename
                // Also optimistically update the list entry's name
                setListDirect(prev => prev.map(c => c.id === cid ? { ...c, name: title } : c));
              }
              setAnimTitleId(cid);
              setTimeout(() => setAnimTitleId(null), 1200);
            },
          });
        };
        ensureConv();
      }, [start, create, runningConvs]);  // runningConvs guards against double-send
      // refresh/rename accessed via refs — no need in deps

      const handleNewSession = useCallback(async () => {
        console.log('[handleNewSession] creating in project', activeProjectId);
        const newId = await create('新对话', activeProjectId);
        console.log('[handleNewSession] done, newId:', newId);
        await refresh(activeProjectId);
        setActiveConvId(newId); setTurns([]);
      }, [create, refresh, activeProjectId]);

      const handleDeleteSession = useCallback(async (id) => {
        stop(id);  // stop background SSE if this conv is running
        await remove(id);
        if (id === activeConvId) { setActiveConvId(list.length > 1 ? list.find(c => c.id !== id)?.id || '' : ''); setTurns([]); }
      }, [remove, activeConvId, list, stop]);

      const handleSelectSession = useCallback((id) => {
        if (id === activeConvId) return;
        // Don't stop background SSE — just switch the view
        setActiveConvId(id);
      }, [activeConvId]);

      const handleSelectProject = useCallback((pid) => {
        if (pid === activeProjectId) return;
        setActiveProjectId(pid);
        store.save({ activeProjectId: pid });
        setActiveConvId(''); setTurns([]);
      }, [activeProjectId, store]);

      const handleNewProject = useCallback(async () => {
        const name = (window.prompt('新建项目名称：') || '').trim();
        if (!name) return;
        try {
          const r = await fetch('/api/v1/projects', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
          const data = await r.json();
          if (!r.ok) { window.alert(data.detail || '创建失败'); return; }
          await refreshProjects();
          setActiveProjectId(data.project_id);
          store.save({ activeProjectId: data.project_id });
          setActiveConvId(''); setTurns([]);
        } catch (e) { console.error('[newProject] error:', e); }
      }, [refreshProjects, store]);

      return (
        <div className="flex h-screen overflow-hidden" onDragOver={handleDragOver} onDragEnter={handleDragEnter} onDragLeave={handleDragLeave} onDrop={handleDrop}>
          <Sidebar projects={projects} activeProjectId={activeProjectId} onSelectProject={handleSelectProject} onNewProject={handleNewProject}
                   conversations={list} activeId={activeConvId} onSelect={handleSelectSession} onDelete={handleDeleteSession} onNewSession={handleNewSession}
                   workspaceDir={workspaceDir} animTitleId={animTitleId} runningConvs={runningConvs} />
          <div className="w-px bg-clay/30 flex-shrink-0" />
          <div className="flex-1 flex flex-col min-w-0">
            {/* Chat header */}
            <div className="px-4 py-2 border-b border-linen/60 bg-cream flex items-center justify-between">
              <h1 className="text-sm font-semibold text-ink font-display">🧭 思悟</h1>
              <div className="flex items-center gap-2">
                {workspaceDir && <span className="text-[10px] text-warmgray/60 truncate max-w-[200px] hidden sm:inline" title={'数据目录: ' + workspaceDir}>📂 {workspaceDir}</span>}
                {devMode && <span className="text-[10px] px-2 py-0.5 rounded bg-seal-wash text-seal">DEV</span>}
                <button onClick={() => setShowSettings(true)} className="text-xs px-2 py-1 rounded bg-dust text-warmgray hover:bg-clay/30">设置</button>
              </div>
            </div>

            {/* Chat flow */}
            <div ref={chatRef} className="flex-1 overflow-y-auto scrollbar-thin">
              {turns.length === 0 && !running && (
                <div className="flex items-center justify-center h-full">
                  {activeConvId && list.some(c => c.id === activeConvId && (c.name === '(加载中…)' || c.name === '(恢复中…)')) ? (
                    <div className="text-center space-y-4 max-w-md mx-auto p-8">
                      <div className="text-5xl animate-pulse">🔄</div>
                      <h2 className="text-lg font-semibold text-ink font-display">正在恢复会话…</h2>
                      <p className="text-sm text-warmgray">后端可能仍在启动或处理中，请稍候。<br/>如果长时间无响应，可以新建对话。</p>
                      <button onClick={handleNewSession} className="mt-4 px-6 py-2 rounded-lg bg-seal text-white text-sm font-medium hover:bg-seal-light transition-colors">新建对话</button>
                    </div>
                  ) : (
                  <div className="text-center space-y-4 max-w-md mx-auto p-8">
                    <div className="text-5xl">🧭</div>
                    <h2 className="text-xl font-bold text-ink font-display">思悟 Agent</h2>
                    <p className="text-sm text-warmgray">以毛泽东思想方法论为认知内核<br/>提出一个问题，开始认知循环</p>
                    {activeConvId && <p className="text-xs text-amber-600 mt-2">会话加载异常，可尝试新建对话</p>}
                  </div>
                  )}
                </div>
              )}
              <div className="max-w-3xl mx-auto py-4 space-y-6 px-6">
                {turns.map((turn, i) => (
                  <div key={i} className="space-y-4 fade-in">
                    {/* Recovering notice after page refresh */}
                    {turn.type === 'recovering' && (
                      <div className="flex justify-center py-4">
                        <div className="flex items-center gap-2 px-4 py-2 rounded-full bg-amber-50 border border-amber-200 text-amber-700 text-xs">
                          <span className="w-3 h-3 rounded-full bg-amber-400 animate-pulse" />
                          服务器正在处理中… 页面已刷新，等待后台完成即自动加载结果。
                        </div>
                      </div>
                    )}
                    {/* User bubble */}
                    {turn.type !== 'recovering' && (
                    <div className="flex justify-end">
                      <div className="max-w-[75%] bg-seal text-white rounded-2xl rounded-tr-md px-5 py-3">
                        <div className="text-sm font-medium">{turn.question}</div>
                        {turn.files && turn.files.length > 0 && (
                          <div className="flex flex-wrap gap-1 mt-2">
                            {turn.files.map((f, i) => (
                              <span key={i} className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-white/20 text-[10px] text-white/80">
                                📎 {f.name}
                              </span>
                            ))}
                          </div>
                        )}
                        {turn.context && <div className="text-[11px] text-white/70 mt-1">{turn.context}</div>}
                        <div className="text-[10px] text-white/50 mt-1">{turn.mode || 'standard'} 模式</div>
                      </div>
                    </div>
                    )}

                    {/* Phase block: live for running last turn, or stored for completed turns (if setting allows) */}
                    {i === turns.length - 1 && turn.running && phaseLogs.length > 0 && (
                      <PhaseBlock phases={phaseLogs} activePhase={activePhase} completedPhases={completedPhases} />
                    )}
                    {!turn.running && turn.phaseLogs && turn.phaseLogs.length > 0 && uiSettings.show_thinking_after_answer !== false && (
                      <PhaseBlock phases={turn.phaseLogs} activePhase={null} completedPhases={new Set(turn.phaseLogs.map(p => p.phase))} />
                    )}

                    {/* Agent bubble */}
                    {!turn.running && turn.summary && (
                      <div className="flex justify-start">
                        <div className="max-w-[80%] bg-cream border border-linen/50 rounded-2xl rounded-tl-md px-5 py-3">
                          <div className="text-xs font-semibold text-warmgray mb-1">🧭 思悟分析</div>
                          <div className="text-sm text-ink leading-relaxed markdown-body"
                            dangerouslySetInnerHTML={{__html: renderMarkdown(turn.summary)}} />
                          {turn.actions && turn.actions.length > 0 && (
                            <div className="mt-3 pt-3 border-t border-linen/40">
                              <div className="text-xs font-semibold text-olive mb-1.5">✅ 行动建议</div>
                              {turn.actions.map((a,j) => (
                                <div key={j} className="flex items-start gap-2 text-xs text-warmgray mb-1">
                                  <span className="w-4 h-4 rounded-full bg-olive text-white text-[9px] flex items-center justify-center flex-shrink-0 mt-0.5">{j+1}</span>
                                  <span>{a}</span>
                                </div>
                              ))}
                            </div>
                          )}
                          {turn.generatedFiles && turn.generatedFiles.length > 0 && (
                            <div className="mt-3 pt-3 border-t border-linen/40">
                              <div className="text-xs font-semibold text-seal mb-1.5">📎 生成文件</div>
                              <div className="space-y-1">
                                {turn.generatedFiles.map((f, j) => {
                                  const isImg = /\.(png|jpg|jpeg|gif|svg|webp|bmp)$/i.test(f.path);
                                  const url = '/api/v1/workspace/files/' + encodeURI(f.path);
                                  return (
                                    <div key={j}>
                                      {isImg ? (
                                        <div className="mt-2">
                                          <img src={url} alt={f.description || f.path} className="max-w-full rounded-lg border border-linen/50" loading="lazy" />
                                          <div className="text-[10px] text-warmgray mt-0.5 truncate">{f.path}</div>
                                        </div>
                                      ) : (
                                        <a href={url} target="_blank" className="flex items-center gap-2 text-xs text-seal hover:text-seal-light hover:underline p-1.5 rounded hover:bg-dust/40 transition-colors">
                                          <span className="text-[10px]">📄</span>
                                          <span className="truncate flex-1">{f.path}</span>
                                          {f.size_bytes > 0 && <span className="text-[10px] text-clay flex-shrink-0">{(f.size_bytes / 1024).toFixed(1)}KB</span>}
                                        </a>
                                      )}
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          )}
                        </div>
                      </div>
                    )}

                    {/* Running indicator */}
                    {turn.running && (
                      <div className="flex justify-start">
                        <div className="bg-cream border border-linen/50 rounded-2xl rounded-tl-md px-5 py-3 animate-pulse">
                          <span className="text-xs text-warmgray">思考中…</span>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>

            {clarify && clarify.convId === activeConvId && clarify.questions && clarify.questions.length > 0 && (
              <div className="px-4 pt-3 bg-cream">
                <div className="max-w-3xl mx-auto bg-seal-wash border border-seal/30 rounded-2xl px-4 py-3">
                  <div className="flex items-center gap-2 mb-1.5">
                    <span className="text-sm">🤔</span>
                    <span className="text-xs font-semibold text-seal">思悟想先跟你确认几点再继续</span>
                  </div>
                  <ol className="space-y-1 mb-1.5 list-none">
                    {clarify.questions.map((q, i) => (
                      <li key={i} className="text-sm text-ink flex gap-2"><span className="text-seal font-semibold flex-shrink-0">{i + 1}.</span><span>{q}</span></li>
                    ))}
                  </ol>
                  <div className="text-[11px] text-warmgray">在下方输入回答后发送即可；留空发送＝跳过，思悟将按现有信息继续。</div>
                </div>
              </div>
            )}
            <InputBar onSend={handleSend} running={running} onStop={stopCurrent} onSteer={handleSteer} model={selectedModel} availableModels={availableModels} onModelChange={v => { setSelectedModel(v); try { localStorage.setItem('siwu_selected_model', v); } catch {} }} projectId={activeProjectId} files={files} setFiles={setFiles} uploading={uploading} handleFiles={handleFiles} awaitingClarification={!!(clarify && clarify.convId === activeConvId)} onAnswer={submitAnswer} />
          </div>
          {showSettings && <SettingsDialog uiSettings={uiSettings} availableModels={availableModels} devMode={devMode} setDevMode={setDevMode} onSave={(s) => {
            setUiSettings(s);
            try { localStorage.setItem('siwu_ui_settings', JSON.stringify(s)); } catch {}
            const fa = FONT_FAMILIES.find(x => x.id === s.font_family);
            const fs = FONT_SIZES.find(x => x.id === s.font_size);
            document.documentElement.style.setProperty('--app-font', (fa || FONT_FAMILIES[0]).css);
            document.documentElement.style.setProperty('--app-font-size', (fs || FONT_SIZES[1]).css);
            if (s.page_zoom) document.body.style.zoom = (s.page_zoom / 100).toString();
          }} onClose={() => setShowSettings(false)} />}
          {dragOver && (
            <div className="fixed inset-0 z-50 bg-ink/25 backdrop-blur-sm flex items-center justify-center pointer-events-none">
              <div className="bg-cream border-2 border-dashed border-seal rounded-3xl px-10 py-8 shadow-xl">
                <div className="text-center space-y-2">
                  <div className="text-4xl">📎</div>
                  <div className="text-sm font-semibold text-ink font-display">松开以上传文件</div>
                  <div className="text-xs text-warmgray">文件将作为本轮提问的资料</div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── RouteGuard ───────────────────────────────────────────
    function RouteGuard() {
      const [checking, setChecking] = useState(true);
      const [configured, setConfigured] = useState(false);
      useEffect(() => { (async () => {
        try { const r = await fetch('/api/v1/setup/status'); const d = await r.json(); setConfigured(d.configured);
          try { localStorage.setItem('siwu_dev_mode', JSON.stringify(!!d.dev_enabled)); } catch {}
        }
        catch { setConfigured(false); } finally { setChecking(false); }
      })(); }, []);
      if (checking) return <div className="min-h-screen bg-paper flex items-center justify-center"><div className="text-warmgray text-sm">正在检查配置…</div></div>;
      if (!configured) return <SetupScreen onConfigured={() => setConfigured(true)} />;
      return <App />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RouteGuard />);
  </script>
</body>
</html>
