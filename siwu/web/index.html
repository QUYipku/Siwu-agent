  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>思悟 Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    :root { --app-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; --app-font-size: 16px; }
    html, body { font-family: var(--app-font); font-size: var(--app-font-size); }
    .markdown-body pre { background: rgba(0,0,0,0.04); border-radius: 6px; padding: 10px 14px; overflow-x: auto; font-size: 0.8em; }
    .markdown-body img { max-width: 100%; height: auto; }
    .markdown-body blockquote { border-left: 3px solid #ccc; padding-left: 12px; color: #666; margin: 8px 0; }
    .markdown-body table { border-collapse: collapse; width: 100%; font-size: 0.85em; }
    .markdown-body th, .markdown-body td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
    .markdown-body th { background: rgba(0,0,0,0.03); font-weight: 600; }
    @keyframes titlePopIn { 0% { opacity: 0.3; transform: translateY(4px); } 60% { opacity: 1; transform: translateY(-1px); } 100% { opacity: 1; transform: translateY(0); } }

  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: '#F7F4ED', cream: '#FCFAF5', linen: '#EDE8DF',
            ink: '#1C1916', warmgray: '#6B6560',
            seal: { DEFAULT: '#8C271E', light: '#B85450', wash: '#FFF5F3' },
            gold: '#9E7B3A', olive: '#4A6741', olivewash: '#F0F5EE',
            clay: '#C5BFB5', dust: '#EFEBE4',
          },
          fontFamily: {
            display: ['"Noto Serif SC"', 'serif'],
            body: ['"Microsoft YaHei"', '"Segoe UI"', 'sans-serif'],

    }
  </script>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    body { font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif; background: #F7F4ED; color: #1C1916; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #C5BFB5; border-radius: 3px; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes buildSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .build-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(140,39,30,0.2); border-top-color: #8C271E; border-radius: 50%; animation: buildSpin 0.7s linear infinite; vertical-align: middle; margin-right: 4px; }

<body class="bg-paper text-ink antialiased">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    const { useState, useCallback, useEffect, useRef, useMemo } = React;
    const LS_KEY = 'siwu_app_state';

    // ── Constants ────────────────────────────────────────────
    const PHASES = [
      { id: 'file_load',      icon: '📎', label: '文件加载', subtitle: '准备资料' },
      { id: 'preprocessing',  icon: '🔎', label: '问题解析', subtitle: '揣度意图' },
      { id: 'investigation', icon: '🔍', label: '调查研究', subtitle: '实事求是' },
      { id: 'contradiction',  icon: '⚡', label: '矛盾分析', subtitle: '抓主要矛盾' },
      { id: 'rational',       icon: '🧠', label: '理性认识', subtitle: '去伪存真' },
      { id: 'decision',       icon: '🎯', label: '决策输出', subtitle: '战略战术' },
      { id: 'practice',       icon: '⚙️', label: '实践检验', subtitle: '检验真理' },
      { id: 'reflection',     icon: '🔄', label: '反思复盘', subtitle: '总结提升' },
    ];
    const PHASE_LABELS = Object.fromEntries(PHASES.map(p => [p.id, p.label]));
    const PHASE_ICONS = Object.fromEntries(PHASES.map(p => [p.id, p.icon]));

    // ── Markdown renderer ──────────────────────────────────────
    // 简易 markdown → HTML，支持公式（MathJax）、图片、链接、代码、列表、粗体
    const IMG_EXT = /\.(png|jpg|jpeg|gif|svg|webp|bmp)$/i;
    function imageUrl(path) {
      if (/^https?:\/\//i.test(path)) return path;
      return '/api/v1/workspace/files/' + encodeURI(path);
    }
    function renderMarkdown(text) {
      if (!text) return '';
      text = cleanPromptLeakage(text);
      // escape HTML first, then apply markdown rules
      let html = text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      // code blocks (before other rules to avoid conflicts)
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
        '<pre class="bg-dust/60 rounded p-3 my-2 overflow-x-auto text-xs"><code>' + code.trim() + '</code></pre>');
      // inline code
      html = html.replace(/`([^`]+)`/g, '<code class="bg-dust/60 px-1 rounded text-xs">$1</code>');
      // images ![alt](path)
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, path) =>
        '<img src="' + imageUrl(path.trim()) + '" alt="' + alt + '" class="max-w-full rounded-lg my-2 border border-linen/50" loading="lazy" />');
      // links [text](url)
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, txt, url) =>
        '<a href="' + url.trim() + '" target="_blank" class="text-seal underline hover:text-seal-light">' + txt + '</a>');
      // bold **text**
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong class="font-semibold">$1</strong>');
      // headings
      html = html.replace(/^### (.+)$/gm, '<h4 class="font-semibold text-ink mt-3 mb-1">$1</h4>');
      html = html.replace(/^## (.+)$/gm, '<h3 class="font-semibold text-ink mt-3 mb-1">$1</h3>');
      html = html.replace(/^# (.+)$/gm, '<h2 class="font-semibold text-ink mt-3 mb-1">$1</h2>');
      // unordered lists
      html = html.replace(/^- (.+)$/gm, '<li class="ml-4 list-disc">$1</li>');
      // numbered lists
      html = html.replace(/^\d+\. (.+)$/gm, '<li class="ml-4 list-decimal">$1</li>');
      // paragraphs: double newline → </p><p>
      html = '<p class="mb-2">' + html.replace(/\n\n+/g, '</p><p class="mb-2">') + '</p>';
      // single newline → <br>
      html = html.replace(/\n/g, '<br>');
      // clean empty paragraphs
      html = html.replace(/<p class="mb-2"><\/p>/g, '');
      return html;
    }

    // ── Prompt-leakage cleaner ─────────────────────────────────
    // Strips common LLM instruction-regurgitation patterns from output.
    function cleanPromptLeakage(text) {
      if (!text) return '';
      let t = text;
      // Strip lines that are pure instruction regurgitation
      const leakagePatterns = [
        /^根据[（(]?给定的?材料[)）]?[，,]?\s*/gm,
        /^根据要求[，,]?\s*/gm,
        /^我们被要求[^。\n]*[。\n]?/gm,
        /^按照(提示|指令|指示|要求)[^。\n]*[。\n]?/gm,
        /^依据(指示|指令|要求)[^。\n]*[。\n]?/gm,
        /^(你的任务是|核心原则是?)[^。\n]*[。\n]?/gm,
        /^要点如下[：:]?\s*/gm,
        /^根据上述(分析|材料|信息|指令)[，,]?\s*/gm,
        /^我(注意到|观察到|发现)(以下)?(几个)?要点[：:]?\s*/gm,
        /^关键发现[：:]\s*/gm,
        /^在(回答|分析|讨论)之前[，,]?[^。\n]*[。\n]?/gm,
      ];
      for (const pat of leakagePatterns) {
        t = t.replace(pat, '');
      }
      // Remove empty leading lines after stripping
      t = t.replace(/^[\s\n]+/, '');
      return t;
    }

    // ── useLocalStore ────────────────────────────────────────
    function useLocalStore() {
      const load = useCallback(() => {
        try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
      }, []);
      const save = useCallback((patch) => {
        const prev = load();
        const next = { ...prev, ...patch };
        localStorage.setItem(LS_KEY, JSON.stringify(next));
      }, [load]);
      return useMemo(() => ({ load, save }), [load, save]);
    }

    // ── useConversations ─────────────────────────────────────
    function useConversations() {
      const [list, setList] = useState([]);
      const [loading, setLoading] = useState(false);
      const store = useLocalStore();
      // 记住最近一次的项目过滤，使内部触发的 refresh（rename/remove）沿用当前项目，而非退回全部
      const lastProjectRef = useRef(undefined);

      const refresh = useCallback(async (projectId, { _retry = 0, _maxRetries = 3 } = {}) => {
        if (projectId !== undefined) lastProjectRef.current = projectId;
        const pid = (projectId !== undefined) ? projectId : lastProjectRef.current;
        setLoading(true);
        try {
          let url = '/api/v1/conversations';
          if (pid !== undefined && pid !== null) url += '?project_id=' + encodeURIComponent(pid);
          const r = await fetch(url);
          if (!r.ok && _retry < _maxRetries) {
            console.log('[refresh] HTTP', r.status, 'retrying', _retry + 1, '/', _maxRetries);
            setLoading(false);
            await new Promise(res => setTimeout(res, 1000 * (_retry + 1)));
            return refresh(projectId, { _retry: _retry + 1, _maxRetries });
          }
          const data = await r.json();
          const convs = data.conversations || [];
          console.log('[refresh] got', convs.length, 'conversations:', convs.map(c => c.id));
          setList(convs);
          store.save({ conversations: convs.map(c => ({ id: c.id, name: c.name, question_count: c.question_count, last_active: c.last_active })) });
        } catch (e) {
          console.error('[refresh] error:', e);
          if (_retry < _maxRetries) {
            console.log('[refresh] retrying', _retry + 1, '/', _maxRetries);
            setLoading(false);
            await new Promise(res => setTimeout(res, 1000 * (_retry + 1)));
            return refresh(projectId, { _retry: _retry + 1, _maxRetries });
          }
          // 最后一次重试也失败了——不清空列表，用 localStorage 缓存兜底
          const cached = store.load();
          const cachedConvs = cached?.conversations || [];
          if (cachedConvs.length) {
            console.log('[refresh] using cached conversations from localStorage:', cachedConvs.length);
            setList(cachedConvs);
          }
          // 即使是空列表也不 setList([])——保留任何已有数据
        }
        finally { setLoading(false); }
      }, [store]);

      const create = useCallback(async (name, projectId) => {
        console.log('[create] POST with name:', name, 'project:', projectId);
        const r = await fetch('/api/v1/conversations', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: name || '新对话', project_id: projectId || '' }) });
        const data = await r.json();
        console.log('[create] got conversation_id:', data.conversation_id);
        // NOTE: caller is responsible for updating the list — do NOT call refresh() here
        // because it races with the caller's optimistic insert.
        return data.conversation_id;
      }, []);  // no deps — only POST endpoint, no refresh dependency

      const rename = useCallback(async (id, name) => {
        await fetch('/api/v1/conversations/' + id, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
        await refresh();
      }, [refresh]);

      const remove = useCallback(async (id) => {
        await fetch('/api/v1/conversations/' + id, { method: 'DELETE' });
        await refresh();
      }, [refresh]);

      const loadTurns = useCallback(async (id, { _retry = 0, _maxRetries = 3 } = {}) => {
        try {
          const r = await fetch('/api/v1/conversations/' + id);
          if (!r.ok && _retry < _maxRetries) {
            console.log('[loadTurns] HTTP', r.status, 'retrying', _retry + 1);
            await new Promise(res => setTimeout(res, 500 * (_retry + 1)));
            return loadTurns(id, { _retry: _retry + 1, _maxRetries });
          }
          const data = await r.json();
          return data.turns || [];
        } catch (e) {
          console.error('[loadTurns] error:', e);
          if (_retry < _maxRetries) {
            await new Promise(res => setTimeout(res, 500 * (_retry + 1)));
            return loadTurns(id, { _retry: _retry + 1, _maxRetries });
          }
          return [];
        }
      }, []);

      return { list, setList, loading, refresh, create, rename, remove, loadTurns };
    }

    // ── useSSE ───────────────────────────────────────────────
    // Supports multiple concurrent SSE streams per conversation for background execution.
    function useSSE() {
      const [runningConvs, setRunningConvs] = useState(() => new Set());
      const esMapRef = useRef({});  // { convId: EventSource }
      const cbMapRef = useRef({});   // { convId: { onPhase, onDone, onTitle } }

      const stop = useCallback((convId) => {
        const es = esMapRef.current[convId];
        const cbs = cbMapRef.current[convId];
        if (es) { es.close(); delete esMapRef.current[convId]; }
        delete cbMapRef.current[convId];
        setRunningConvs(prev => { const next = new Set(prev); next.delete(convId); return next; });
        // 更新 UI：标记 turn 为已完成
        if (cbs?.onDone) {
          cbs.onDone({ done: true, summary: '**已终止**\n\n认知循环已由用户手动终止。', error: '' });
        }
      }, []);

      const start = useCallback((question, context, mode, conversationId, reviewStrategy, model, projectId, files, { onPhase, onDone, onTitle, onClarification }) => {
        // Don't re-start if already running for this conv
        if (esMapRef.current[conversationId]) return;
        cbMapRef.current[conversationId] = { onPhase, onDone, onTitle, onClarification };
        const url = '/api/v1/agent/run/stream'
          + '?question=' + encodeURIComponent(question)
          + '&context=' + encodeURIComponent(context)
          + '&mode=' + encodeURIComponent(mode)
          + '&conversation_id=' + encodeURIComponent(conversationId)
          + '&review_strategy=' + encodeURIComponent(reviewStrategy || 'once')
          + '&model=' + encodeURIComponent(model || '')
          + '&project_id=' + encodeURIComponent(projectId || '')
          + '&files=' + encodeURIComponent((files && files.length) ? files.join(',') : '')
          + '&dev_trace=1';
        const es = new EventSource(url);
        esMapRef.current[conversationId] = es;
        setRunningConvs(prev => new Set([...prev, conversationId]));
        es.onmessage = (e) => {
          try {
            const data = JSON.parse(e.data);
            const cbs = cbMapRef.current[conversationId];
            if (data.type === 'title') {
              console.log('[SSE] title event received:', data.title, 'for', data.conversation_id);
              cbs?.onTitle?.(data.title, data.conversation_id);
            } else if (data.type === 'clarification') {
              console.log('[SSE] clarification for', conversationId, ':', data.questions);
              cbs?.onClarification?.(data.questions || [], conversationId);
            } else if (data.done) {
              console.log('[SSE] done event for', conversationId);
              es.close(); delete esMapRef.current[conversationId];
              setRunningConvs(prev => { const next = new Set(prev); next.delete(conversationId); return next; });
              cbs?.onDone?.(data);
            } else if (data.phase) {
              console.log('[SSE] phase for', conversationId, ':', data.phase);
              cbs?.onPhase?.(data.phase, data.summary || '', data.data || null);
            }
          } catch (e2) { console.error('[SSE] parse error:', e2); }
        };
        es.onerror = () => {
          es.close(); delete esMapRef.current[conversationId];
          setRunningConvs(prev => { const next = new Set(prev); next.delete(conversationId); return next; });
          const cbs = cbMapRef.current[conversationId];
          cbs?.onDone?.({ error: '连接中断' });
          delete cbMapRef.current[conversationId];
        };
      }, []);

      const attach = useCallback((convId, { onPhase, onDone, onClarification }) => {
        if (esMapRef.current[convId]) return;
        cbMapRef.current[convId] = { onPhase, onDone, onClarification };
        const url = '/api/v1/agent/run/stream?conversation_id=' + encodeURIComponent(convId);
        const es = new EventSource(url);
        esMapRef.current[convId] = es;
        setRunningConvs(prev => new Set([...prev, convId]));
        es.onmessage = (e) => {
          try {
            const data = JSON.parse(e.data);
            const cbs = cbMapRef.current[convId];
            if (data.type === 'clarification') {
              cbs?.onClarification?.(data.questions || [], convId);
            } else if (data.done) {
              es.close(); delete esMapRef.current[convId];
              setRunningConvs(prev => { const next = new Set(prev); next.delete(convId); return next; });
              cbs?.onDone?.(data);
            } else if (data.phase) {
              cbs?.onPhase?.(data.phase, data.summary || '', data.data || null);
            }
          } catch (e2) { console.error('[SSE attach] parse error:', e2); }
        };
        es.onerror = () => {
          es.close(); delete esMapRef.current[convId];
          setRunningConvs(prev => { const next = new Set(prev); next.delete(convId); return next; });
          const cbs = cbMapRef.current[convId];
          cbs?.onDone?.({ error: 'attach_failed' });
          delete cbMapRef.current[convId];
        };
      }, []);

      useEffect(() => {
        return () => {
          Object.values(esMapRef.current).forEach(es => es.close());
          esMapRef.current = {};
        };
      }, []);
      return { runningConvs, start, stop, attach };
    }

    // ── Sidebar（Codex 式单栏：项目选择 + 会话列表 合一）─────────
    function Sidebar({ projects, activeProjectId, onSelectProject, onNewProject,
                       conversations, activeId, onSelect, onDelete, onNewSession,
                       workspaceDir, animTitleId, runningConvs }) {
      const [projOpen, setProjOpen] = useState(false);
      const activeProject = (projects || []).find(p => p.id === activeProjectId) || (projects || [])[0];
      return (
        <aside className="w-60 bg-linen/60 flex flex-col flex-shrink-0 border-r border-clay/30">
          {/* 品牌 + 新建对话 */}
          <div className="px-3 py-3 flex items-center justify-between border-b border-clay/20">
            <span className="text-sm font-semibold text-ink font-display">🧭 思悟</span>
            <button onClick={onNewSession} title="新建对话"
              className="w-6 h-6 rounded-lg bg-seal text-white text-sm flex items-center justify-center hover:bg-seal-light transition-colors">＋</button>
          </div>
          {/* 项目选择器 */}
          <div className="px-2 py-2 border-b border-clay/20">
            <button onClick={() => setProjOpen(v => !v)}
              className="w-full flex items-center justify-between px-2 py-1.5 rounded-lg hover:bg-dust/50 transition-colors">
              <span className="flex items-center gap-1.5 min-w-0">
                <span className="text-xs">📁</span>
                <span className="truncate text-xs font-medium text-ink">{activeProject ? activeProject.name : '默认项目'}</span>
              </span>
              <span className="text-clay text-[9px] flex-shrink-0">{projOpen ? '▲' : '▼'}</span>
            </button>
            {projOpen && (
              <div className="mt-1 space-y-0.5">
                {(projects || []).map(p => (
                  <button key={p.id || '__default__'} onClick={() => { onSelectProject(p.id); setProjOpen(false); }}
                    className={'w-full text-left px-2 py-1 rounded text-xs flex items-center justify-between gap-1 ' + (p.id === activeProjectId ? 'bg-paper border border-clay/30 shadow-sm' : 'hover:bg-dust/40')}>
                    <span className="truncate text-ink">{p.name}</span>
                    <span className="text-[10px] text-clay flex-shrink-0">{p.conversation_count || 0}</span>
                  </button>
                ))}
                <button onClick={onNewProject}
                  className="w-full text-left px-2 py-1 rounded text-xs text-seal hover:bg-seal-wash transition-colors">＋ 新建项目</button>
              </div>
            )}
          </div>
          {/* 会话列表 */}
          <div className="px-3 pt-2 pb-1">
            <span className="text-[10px] font-semibold text-warmgray uppercase tracking-wide">对话</span>
          </div>
          <div className="flex-1 overflow-y-auto scrollbar-thin px-1 space-y-0.5">
            {(!conversations || !conversations.length) && (
              <div className="p-3 text-xs text-warmgray text-center mt-6">暂无对话</div>
            )}
            {[...(conversations || [])].reverse().map(c => (
              <button key={c.id} onClick={() => onSelect(c.id)}
                className={'w-full text-left px-2.5 py-2 rounded-lg text-xs transition-colors group ' + (c.id === activeId ? 'bg-paper border border-clay/30 shadow-sm' : 'hover:bg-dust/50')}>
                <div className="flex items-center gap-1.5">
                  {runningConvs && runningConvs.has(c.id) && (
                    <span className="w-2.5 h-2.5 rounded-full border-2 border-seal animate-pulse flex-shrink-0" title="后台运行中" />
                  )}
                  <span className={'font-medium text-ink truncate ' + (c.id === animTitleId ? 'title-fade-in' : '')}>{c.name || c.id}</span>
                </div>
                <div className="text-[10px] text-warmgray mt-0.5 flex justify-between items-center">
                  <span>{c.question_count || 0} 轮</span>
                  <span onClick={e => { e.stopPropagation(); onDelete(c.id); }}
                    className="opacity-0 group-hover:opacity-100 text-clay hover:text-seal transition-opacity">×</span>
                </div>
              </button>
            ))}
          </div>
          {/* 工作空间 */}
          {workspaceDir && (
            <div className="p-2 border-t border-clay/20 text-[9px] text-clay leading-tight">
              <div className="font-semibold text-warmgray mb-0.5">📁 工作空间</div>
              <div className="truncate" title={workspaceDir}>{workspaceDir}</div>
            </div>
          )}
        </aside>
      );
    }

    // ── PhaseBlock (inline in turns) ─────────────────────────
    function PhaseBlock({ phases, activePhase, completedPhases }) {
      const [expanded, setExpanded] = useState(false);
      const [expandedDetail, setExpandedDetail] = useState(new Set());
      const toggleDetail = (phase) => {
        setExpandedDetail(prev => {
          const next = new Set(prev);
          if (next.has(phase)) next.delete(phase); else next.add(phase);
          return next;
        });
      };
      const hasPhases = phases.length > 0;
      if (!hasPhases && !activePhase) return null;

      return (
        <div className="mx-10 my-2 bg-cream border border-linen/50 rounded-lg overflow-hidden">
          <button onClick={() => setExpanded(!expanded)}
            className="w-full px-3 py-2 flex items-center gap-2 hover:bg-dust/30 transition-colors text-left">
            <span className="text-[10px] font-semibold text-warmgray">{expanded ? '▲' : '▼'} 认知过程</span>
            <div className="flex gap-1">
              {PHASES.map(p => {
                const isActive = activePhase === p.id;
                const isDone = completedPhases.has(p.id);
                let ring = 'border-clay/30';
                if (isActive) ring = 'border-seal bg-seal-wash';
                else if (isDone) ring = 'border-olive/50 bg-olivewash';
                return (
                  <span key={p.id} className={'w-5 h-5 rounded-full border text-[9px] flex items-center justify-center ' + ring + (isActive ? ' animate-pulse' : '')}>
                    {p.icon}
                  </span>
                );
              })}
            </div>
          </button>
          {expanded && (
            <div className="px-3 pb-3 border-t border-linen/30">
              <div className="space-y-1.5 mt-2">
                {phases.map((p, idx) => (
                  <div key={p.phase + '-' + idx}>
                    <button onClick={() => toggleDetail(idx)}
                      className="w-full flex items-start gap-2 p-2 rounded hover:bg-dust/40 text-left text-xs">
                      <span>{PHASE_ICONS[p.phase] || '•'}</span>
                      <span className="font-medium text-ink whitespace-nowrap flex-shrink-0">{PHASE_LABELS[p.phase]}</span>
                      <span className="text-warmgray flex-1 truncate">{p.summary}</span>
                      {p.data && <span className="text-clay">{expandedDetail.has(idx) ? '▲' : '▼'}</span>}
                    </button>
                    {expandedDetail.has(idx) && p.data && (
                      <div className="ml-6 mb-1"><PhaseDetail phase={p.phase} data={p.data} /></div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── InputBar ──────────────────────────────────────────────
    function InputBar({ onSend, running, onStop, onSteer, model, availableModels, onModelChange, projectId, files, setFiles, uploading, handleFiles, awaitingClarification, onAnswer }) {
      const [question, setQuestion] = useState('');
      const [context, setContext] = useState('');
      const [mode, setMode] = useState('deep');
      const [reviewStrategy, setReviewStrategy] = useState('off');
      const [showContext, setShowContext] = useState(false);
      const fileRef = useRef(null);

      const handleSend = useCallback(() => {
        if (awaitingClarification) {
          onAnswer?.(question.trim());   // 空串＝跳过
          setQuestion(''); setContext('');
          return;
        }
        if (!question.trim()) return;
        if (running) {
          onSteer?.(question.trim());
        } else {
          onSend(question.trim(), context.trim(), mode, reviewStrategy, model, files);
        }
        setQuestion('');
        setContext('');
        setFiles([]);
      }, [question, context, mode, reviewStrategy, model, running, onSend, onSteer, files, awaitingClarification, onAnswer]);

      const handleKeyDown = useCallback(e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
      }, [handleSend]);

      return (
        <div className="border-t border-linen/60 bg-cream px-4 py-3">
          {!running && files.length > 0 && (
            <div className="flex flex-wrap gap-1 mb-2">
              {files.map((f, i) => (
                <span key={i} className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-dust/70 text-[10px] text-warmgray">
                  📎 <span className="truncate max-w-[140px]" title={f.path}>{f.name}</span>
                  <span onClick={() => setFiles(prev => prev.filter((_, j) => j !== i))} className="cursor-pointer text-clay hover:text-seal">×</span>
                </span>
              ))}
            </div>
          )}
          <div className="flex items-end gap-2">
            <textarea value={question} onChange={e => setQuestion(e.target.value)} onKeyDown={handleKeyDown}
              placeholder={awaitingClarification ? "回答思悟的问题…（Enter 发送，留空＝跳过）" : running ? "输入引导指令…（Enter 发送）" : "提出一个问题…（Enter 发送，Shift+Enter 换行）"}
              rows={1}
              className="flex-1 resize-none bg-paper border border-linen/60 rounded-lg px-4 py-2.5 text-sm text-ink placeholder:text-clay focus:outline-none focus:border-seal/50 focus:ring-1 focus:ring-seal/20" />
            {awaitingClarification ? (
              <>
                <button onClick={handleSend} className="px-5 py-2.5 rounded-lg bg-seal text-white text-sm font-semibold hover:bg-seal-light flex-shrink-0">回答 →</button>
                <button onClick={onStop} className="px-4 py-2.5 rounded-lg bg-warmgray text-white text-sm font-semibold hover:bg-warmgray/80 flex-shrink-0">⛔ 终止</button>
              </>
            ) : running ? (
              <>
                <button onClick={handleSend} disabled={!question.trim()} className="px-4 py-2.5 rounded-lg bg-olive text-white text-sm font-semibold hover:bg-olive/80 disabled:opacity-40 flex-shrink-0">引导 →</button>
                <button onClick={onStop} className="px-4 py-2.5 rounded-lg bg-warmgray text-white text-sm font-semibold hover:bg-warmgray/80 flex-shrink-0">⛔ 终止</button>
              </>
            ) : (
              <button onClick={handleSend} disabled={!question.trim()} className="px-5 py-2.5 rounded-lg bg-seal text-white text-sm font-semibold hover:bg-seal-light disabled:opacity-40 flex-shrink-0">→ 发送</button>
            )}
          </div>
          <div className="flex items-center gap-2 mt-1.5">
            <button onClick={() => setShowContext(!showContext)} className="text-[10px] text-warmgray hover:text-seal">{showContext ? '收起' : '+ 背景'}</button>
            <input ref={fileRef} type="file" multiple className="hidden" onChange={e => { handleFiles(e.target.files); e.target.value = ''; }} />
            <button onClick={() => fileRef.current && fileRef.current.click()} disabled={running || uploading}
              className="text-[10px] text-warmgray hover:text-seal disabled:opacity-40" title="上传文件（作为本轮提问的资料）">{uploading ? '上传中…' : '📎 附件'}</button>
            {showContext && (
              <input value={context} onChange={e => setContext(e.target.value)} placeholder="背景上下文（可选）"
                className="flex-1 bg-paper border border-linen/40 rounded px-2 py-1 text-xs text-ink placeholder:text-clay focus:outline-none focus:border-seal/40" />
            )}
            <select value={mode} onChange={e => setMode(e.target.value)}
              className="bg-paper border border-linen/40 rounded px-1.5 py-1 text-[11px] text-warmgray focus:outline-none">
              <option value="fast">快速</option>
              <option value="standard">标准</option>
              <option value="deep">深度</option>
            </select>
            <select value={reviewStrategy} onChange={e => setReviewStrategy(e.target.value)}
              className="bg-paper border border-linen/40 rounded px-1.5 py-1 text-[11px] text-warmgray focus:outline-none" title="多视角审查策略">
              <option value="off">不审查</option>
              <option value="once">审查·首轮</option>
              <option value="iterative">审查·迭代</option>
            </select>
            {availableModels && availableModels.length > 0 && (
              <select value={model} onChange={e => onModelChange?.(e.target.value)}
                className="bg-paper border border-linen/40 rounded px-1.5 py-1 text-[11px] text-warmgray focus:outline-none focus:border-seal/40" title="选择模型">
                {availableModels.map(m => <option key={m} value={m}>{m}</option>)}
              </select>
            )}
          </div>
        </div>
      );
    }

    // ── Phase Detail renderers ───────────────────────────────
    function InvestigationDetail({ data }) {
      const facts = data?.facts || [];
      const gaps = data?.gaps || [];
      const credColors = v => v >= 0.8 ? 'bg-olive text-white' : v >= 0.5 ? 'bg-gold/80 text-white' : 'bg-clay text-ink';
      const impColors = v => v === 'high' ? 'bg-seal text-white' : v === 'medium' ? 'bg-gold/80 text-white' : 'bg-clay text-ink';
      return (
        <div className="space-y-2 text-xs">
          {facts.length > 0 && <div><div className="font-semibold text-olive mb-1">📋 事实 ({facts.length})</div>
            {facts.map((f,i) => <div key={i} className="bg-dust/60 rounded p-2 mb-1"><span className="text-ink">• {f.content}</span>
              <div className="flex gap-1.5 mt-1"><span className="px-1 py-0.5 rounded text-[9px] bg-paper border text-warmgray">{f.source_type||'unknown'}</span>
                <span className={'px-1 py-0.5 rounded text-[9px] ' + credColors(f.credibility)}>可信{Math.round((f.credibility||0.5)*100)}%</span></div></div>)}
          </div>}
          {gaps.length > 0 && <div><div className="font-semibold text-seal mb-1">❓ 缺口 ({gaps.length})</div>
            {gaps.map((g,i) => <div key={i} className="bg-seal-wash rounded p-2 mb-1"><span className={'px-1 py-0.5 rounded text-[9px] mr-1 ' + impColors(g.importance)}>{g.importance==='high'?'高':g.importance==='medium'?'中':'低'}</span><span className="text-ink">{g.description}</span>
              {g.suggested_query && <div className="text-[10px] text-warmgray mt-1">🔍 {g.suggested_query}</div>}</div>)}
          </div>}
        </div>);
    }

    function ContradictionDetail({ data }) {
      const pc = data?.principal_contradiction; const sc = data?.secondary_contradictions || [];
      const cgd = data?.contradiction_derivation; // overall derivation chain

      // Helper: render a single derivation chain
      function DerivationChainView({ chain, label, color }) {
        if (!chain || !(chain.steps||[]).length) return null;
        return (
          <div className="mt-2 pt-2 border-t border-linen/30">
            <div className="text-[11px] font-semibold text-warmgray mb-1.5">{label || '推导链'}</div>
            {chain.summary && <p className="text-[10px] text-warmgray italic mb-1.5">{chain.summary}</p>}
            {chain.factual_foundation && chain.factual_foundation.length > 0 && (
              <div className="flex flex-wrap gap-1 mb-2">
                {chain.factual_foundation.map((f,i) => <span key={i} className="px-1.5 py-0.5 rounded text-[9px] bg-dust/60 text-warmgray">{typeof f === 'string' ? f : (f.content || f)}</span>)}
              </div>
            )}
            <div className="space-y-1.5">
              {chain.steps.map((s,i) => (
                <div key={s.step_id || i} className="flex items-start gap-2 relative">
                  {/* Vertical connector line */}
                  {i < chain.steps.length - 1 && <div className="absolute left-[7px] top-5 bottom-0 w-0.5 bg-clay/30" />}
                  <div className={`w-3.5 h-3.5 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5 text-[8px] text-white ${(s.confidence||0.7) >= 0.8 ? 'bg-olive' : (s.confidence||0.7) >= 0.5 ? 'bg-gold' : 'bg-clay'}`}
                    title={`置信度 ${Math.round((s.confidence||0.7)*100)}%`}>{i+1}</div>
                  <div className="flex-1 min-w-0">
                    {s.conclusion && <div className="text-[11px] text-ink font-medium">{s.conclusion}</div>}
                    {s.inference && <div className="text-[10px] text-warmgray mt-0.5 leading-relaxed">推理：{s.inference}</div>}
                    {(s.fact_basis||[]).length > 0 && (
                      <div className="flex flex-wrap gap-0.5 mt-1">
                        {(s.fact_basis||[]).map((f,j) => <span key={j} className="px-1 rounded text-[8px] bg-paper border text-clay/70">{typeof f === 'string' ? f : (f.content || f)}</span>)}
                      </div>
                    )}
                    <div className="flex items-center gap-2 mt-0.5">
                      <span className={`text-[8px] px-1 rounded ${(s.confidence||0.7) >= 0.8 ? 'bg-olivewash text-olive' : (s.confidence||0.7) >= 0.5 ? 'bg-gold/10 text-gold' : 'bg-clay/20 text-clay'}`}>
                        置信度 {Math.round((s.confidence||0.7)*100)}%
                      </span>
                      {s.reversible && <span className="text-[8px] text-clay">可修正</span>}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      return (<div className="space-y-3 text-xs">
        {/* Overall derivation chain if present */}
        {cgd && (cgd.steps||[]).length > 0 && (
          <DerivationChainView chain={cgd} label="📐 矛盾分析整体推导" color="olive" />
        )}
        {/* Principal contradiction */}
        {pc && <div className="bg-seal-wash border border-seal/20 rounded p-2">
          <div className="font-semibold text-seal mb-1">⚡ 主要矛盾</div>
          <p className="text-ink">{pc.description}</p>
          {(pc.tension_poles||[]).length>0 && <div className="flex flex-wrap gap-1 mt-1.5">{pc.tension_poles.map((p,i)=><span key={i} className="px-1.5 py-0.5 rounded-full bg-paper border text-[10px] text-warmgray">{p}</span>)}</div>}
          {pc.primary_aspect && <p className="text-[10px] text-warmgray mt-1">主要方面：{pc.primary_aspect}</p>}
          {pc.particularity_description && (
            <p className="text-[10px] text-warmgray mt-1.5 border-t border-seal/10 pt-1.5 leading-relaxed">
              <span className="font-semibold">特殊性：</span>{pc.particularity_description}
            </p>
          )}
          {pc.transformation_condition && <p className="text-[10px] text-seal mt-1">转化条件：{pc.transformation_condition}</p>}
          <DerivationChainView chain={pc.derivation_chain} label="推导过程" color="seal" />
        </div>}
        {/* Secondary contradictions */}
        {sc.length>0 && <div>
          <div className="font-semibold text-gold mb-1.5">次要矛盾 ({sc.length})</div>
          {sc.map((c,i) => (
            <div key={i} className="bg-dust/60 rounded p-1.5 text-[11px] mb-1.5">
              <span className="text-ink">{c.description}</span>
              {(c.tension_poles||[]).length>0 && <div className="flex flex-wrap gap-1 mt-1">{c.tension_poles.map((p,j)=><span key={j} className="px-1 py-0.5 rounded-full bg-paper border text-[9px] text-warmgray">{p}</span>)}</div>}
              {c.particularity_description && <p className="text-[9px] text-warmgray mt-1 leading-relaxed"><span className="font-semibold">特殊性：</span>{c.particularity_description}</p>}
              <DerivationChainView chain={c.derivation_chain} label="" color="gold" />
            </div>
          ))}
        </div>}
        {/* Position shifts if any */}
        {(data?.position_shifts||[]).length > 0 && (
          <div className="bg-gold/5 border border-gold/20 rounded p-2">
            <div className="font-semibold text-gold mb-1 text-[10px]">📈 矛盾地位转换</div>
            {data.position_shifts.map((ps,i) => (
              <div key={i} className="text-[10px] text-warmgray mb-0.5">
                {ps.contradiction_description?.slice(0,80)}：{ps.from_role} → {ps.to_role}
                {ps.trigger_iteration > 0 && <span className="text-clay ml-1">（第{ps.trigger_iteration}轮）</span>}
              </div>
            ))}
          </div>
        )}
      </div>);
    }

    function RationalDetail({ data }) {
      const d=data||{};
      return (<div className="space-y-2 text-xs">
        {d.essence && <div className="bg-olivewash border border-olive/20 rounded p-2"><div className="font-semibold text-olive mb-1">💡 本质</div><p className="text-ink">{d.essence}</p></div>}
        {(d.patterns||[]).length>0 && <div>{d.patterns.map((p,i)=><div key={i} className="text-warmgray pl-2 border-l-2 border-olive/30 mb-0.5">• {p}</div>)}</div>}
        {(d.hypotheses||[]).length>0 && <div><div className="font-semibold text-gold mb-1">🧪 假设</div>{d.hypotheses.map((h,i)=><div key={i} className="text-warmgray pl-2 border-l-2 border-gold/30 mb-0.5">• {h}</div>)}</div>}
        {d.qualitative_threshold && <p className="text-[10px] text-seal">临界点：{d.qualitative_threshold}</p>}
      </div>);
    }

    function DecisionDetail({ data }) {
      const d=data||{}; const actions=d.action_items||[];
      return (<div className="space-y-2 text-xs">
        {d.strategic_assessment && <div className="bg-olivewash border border-olive/20 rounded p-2"><div className="font-semibold text-olive mb-1">🎯 战略</div><p className="text-ink">{d.strategic_assessment}</p></div>}
        {actions.length>0 && <div><div className="font-semibold text-seal mb-1">📋 行动 ({actions.length})</div>
          {actions.map((a,i)=><div key={i} className="bg-paper border rounded p-1.5 mb-1"><span className="px-1 py-0.5 rounded text-[9px] bg-seal text-white mr-1">P{a.priority||i+1}</span><span className="text-ink font-medium">{a.description}</span>
            {a.expected_outcome && <div className="text-[10px] text-olive mt-0.5">✓ {a.expected_outcome}</div>}</div>)}</div>}
        {(d.risks||[]).length>0 && <div>{d.risks.map((r,i)=><div key={i} className="text-seal-light pl-2 border-l-2 border-seal/30 mb-0.5">• {r}</div>)}</div>}
      </div>);
    }

    function PerspectivesDetail({ data }) {
      const d=data||{}; const views=d.views||[];
      return (<div className="space-y-2 text-xs">
        {d.synthesized_insight && <p className="text-warmgray italic">{d.synthesized_insight}</p>}
        {(d.critical_warnings||[]).length>0 && <div><div className="font-semibold text-seal mb-1">🚨 警告</div>{d.critical_warnings.map((w,i)=><div key={i} className="text-seal bg-seal-wash rounded px-2 py-1 mb-0.5">⚠ {w}</div>)}</div>}
        {views.length>0 && <div><div className="font-semibold text-olive mb-1">👥 视角 ({views.length})</div>{views.map((v,i)=><div key={i} className="bg-paper border rounded p-1.5 mb-1"><span className="font-semibold text-ink">{v.perspective_name}</span><p className="text-warmgray mt-0.5">{v.critique}</p></div>)}</div>}
      </div>);
    }

    function PracticeDetail({ data }) {
      const d=data||{}; const steps=d.steps_taken||[];
      return (<div className="space-y-2 text-xs">
        {d.practice_summary && <p className="text-warmgray italic">{d.practice_summary}</p>}
        {steps.length>0 && <div>{steps.map((s,i)=><div key={i} className="bg-paper border rounded p-1.5 mb-1"><div className="font-medium text-ink">步骤{i+1}: {s.description}</div>
          {s.observed_result && <div className={'mt-0.5 px-1.5 py-0.5 rounded text-[10px] '+(s.matched_expectation!==false?'bg-olivewash text-olive':'bg-seal-wash text-seal')}>📊 {s.observed_result}</div>}</div>)}</div>}
        {(d.unexpected_findings||[]).length>0 && <div>{d.unexpected_findings.map((f,i)=><div key={i} className="text-seal-light pl-2 border-l-2 border-seal/30 mb-0.5">• {f}</div>)}</div>}
      </div>);
    }

    function ReflectionDetail({ data }) {
      const d=data||{};
      return (<div className="space-y-2 text-xs">
        <div className="flex flex-wrap gap-1.5">
          <span className="px-1.5 py-0.5 rounded-full bg-olivewash text-[10px] text-olive">收敛 {((d.convergence_score||0)*100).toFixed(0)}%</span>
          <span className="px-1.5 py-0.5 rounded-full bg-gold/10 text-[10px] text-gold">{d.understanding_level||'感性'}</span>
          {d.qualitative_leap && <span className="px-1.5 py-0.5 rounded-full bg-seal-wash text-[10px] text-seal">质变飞跃</span>}
          {d.should_reinvestigate && <span className="px-1.5 py-0.5 rounded-full bg-seal-wash text-[10px] text-seal">建议再调查</span>}
        </div>
        {d.quality_assessment && <p className="text-warmgray">{d.quality_assessment}</p>}
        {(d.lessons_learned||[]).length>0 && <div>{d.lessons_learned.map((l,i)=><div key={i} className="text-warmgray pl-2 border-l-2 border-olive/30 mb-0.5">• {l}</div>)}</div>}
        {(d.cognitive_biases_found||[]).length>0 && <div>{d.cognitive_biases_found.map((b,i)=><div key={i} className="text-seal-light pl-2 border-l-2 border-seal/30 mb-0.5">• {b}</div>)}</div>}
        {d.reinvestigation_focus && <p className="text-warmgray italic">🔍 焦点：{d.reinvestigation_focus}</p>}
      </div>);
    }

    function PreprocessingDetail({ data }) {
      const domains = data?.question_domains || [];
      const subQs = data?.structured_sub_questions || [];
      return (
        <div className="space-y-2 text-xs">
          {data?.expanded_question && (
            <div>
              <div className="font-semibold text-seal mb-1">📝 结构化问题</div>
              <div className="bg-dust/60 rounded p-2 text-ink leading-relaxed">{data.expanded_question}</div>
            </div>
          )}
          {data?.question_intent && (
            <div>
              <div className="font-semibold text-olive mb-1">🎯 意图识别</div>
              <div className="bg-dust/60 rounded p-2 text-ink">{data.question_intent}</div>
            </div>
          )}
          {data?.contradiction_in_question && (
            <div>
              <div className="font-semibold text-seal mb-1">⚡ 问题中的矛盾</div>
              <div className="bg-dust/60 rounded p-2 text-ink leading-relaxed">{data.contradiction_in_question}</div>
            </div>
          )}
          {data?.core_anxiety && (
            <div>
              <div className="font-semibold text-warmgray mb-1">💭 深层关切</div>
              <div className="bg-dust/60 rounded p-2 text-ink">{data.core_anxiety}</div>
            </div>
          )}
          {domains.length > 0 && (
            <div>
              <div className="font-semibold text-olive mb-1">🌐 关联领域</div>
              <div className="flex flex-wrap gap-1">
                {domains.map((d, i) => <span key={i} className="px-2 py-0.5 rounded-full text-[10px] bg-seal-wash text-seal border border-seal/20">{d}</span>)}
              </div>
            </div>
          )}
          {subQs.length > 0 && (
            <div>
              <div className="font-semibold text-olive mb-1">🔍 拆解子问题</div>
              <div className="space-y-1">
                {subQs.map((q, i) => (
                  <div key={i} className="flex gap-2 bg-dust/60 rounded p-2">
                    <span className="text-seal font-semibold flex-shrink-0">{i + 1}.</span>
                    <span className="text-ink">{q}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    function PhaseDetail({ phase, data }) {
      if (!data) return null;
      switch (phase) {
        case 'preprocessing': return <PreprocessingDetail data={data} />;
        case 'investigation': return <InvestigationDetail data={data} />;
        case 'contradiction':  return <ContradictionDetail data={data} />;
        case 'rational':       return <RationalDetail data={data} />;
        case 'decision':       return <DecisionDetail data={data} />;
        case 'perspectives':   return <PerspectivesDetail data={data} />;
        case 'practice':       return <PracticeDetail data={data} />;
        case 'reflection':     return <ReflectionDetail data={data} />;
        default: return null;
      }
    }

    // ── DevTracePanel ────────────────────────────────────────
    function DevTracePanel({ records }) { /* kept for dev mode */ return null; }

    function ResultPanel({ summary, actions }) {
      if (!summary) return null;
      return (
        <div className="p-3 bg-olivewash border border-olive/20 rounded-lg text-xs">
          <div className="font-semibold text-olive mb-1">📝 结论</div>
          <div className="text-ink whitespace-pre-wrap leading-relaxed">{summary}</div>
          {actions && actions.length > 0 && (
            <div className="mt-2">
              <div className="font-semibold text-olive mb-1">✅ 行动建议</div>
              {actions.map((a,i) => <div key={i} className="flex items-center gap-1.5 text-warmgray mb-0.5"><span className="w-4 h-4 rounded-full bg-olive text-white text-[9px] flex items-center justify-center">{i+1}</span> {a}</div>)}
            </div>
          )}
        </div>
      );
    }

    const FONT_FAMILIES = [
      { id: 'system', label: '系统默认', css: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif' },
      { id: 'serif',  label: '思源宋体 / 衬线', css: '"Noto Serif SC", "Source Han Serif SC", "STSong", Georgia, serif' },
      { id: 'mono',   label: '等宽 / 代码', css: '"JetBrains Mono", "Fira Code", "SF Mono", "Cascadia Code", Consolas, monospace' },
    ];
    const FONT_SIZES = [
      { id: 'small',  label: '小', css: '14px' },
      { id: 'medium', label: '中', css: '16px' },
      { id: 'large',  label: '大', css: '18px' },
    ];

    function SettingsDialog({ uiSettings, onSave, onClose, availableModels, devMode, setDevMode }) {
      const [activeTab, setActiveTab] = useState('general');
      // ── 通用 (General) ──
      const [persona, setPersona] = useState(uiSettings.agent_persona || '');
      const [knowledge, setKnowledge] = useState(uiSettings.custom_knowledge || '');
      const [phaseModels, setPhaseModels] = useState(uiSettings.phase_models || {});
      const [showThinking, setShowThinking] = useState(uiSettings.show_thinking_after_answer !== false);
      const [maxIterations, setMaxIterations] = useState(uiSettings.max_iterations || 0);
      const [practiceRounds, setPracticeRounds] = useState(uiSettings.practice_rounds || 0);
      const [searchMaxResults, setSearchMaxResults] = useState(uiSettings.web_search_max_results || 0);
      const [fetchMaxUrls, setFetchMaxUrls] = useState(uiSettings.web_fetch_max_urls || 0);
      const [fetchMaxCharsPerPage, setFetchMaxCharsPerPage] = useState(uiSettings.web_fetch_max_chars_per_page || 0);
      const [fetchMaxTotalChars, setFetchMaxTotalChars] = useState(uiSettings.web_fetch_max_total_chars || 0);
      // ── 外观 (Appearance) ──
      const [fontFamily, setFontFamily] = useState(uiSettings.font_family || 'system');
      const [fontSize, setFontSize] = useState(uiSettings.font_size || 'medium');
      const [pageZoom, setPageZoom] = useState(uiSettings.page_zoom || 100);
      // ── 账户 (Account) ──
      const [provider, setProvider] = useState('deepseek');
      const [baseUrl, setBaseUrl] = useState('');
      const [apiKey, setApiKey] = useState('');
      const [model, setModel] = useState('');
      const [showKey, setShowKey] = useState(false);
      const [testing, setTesting] = useState(false);
      const [testResult, setTestResult] = useState(null);
      const [accountSaving, setAccountSaving] = useState(false);
      const [accountModels, setAccountModels] = useState([]);
      const [saving, setSaving] = useState(false);
      // Per-provider key cache — each provider remembers its own key while dialog is open
      const providerKeys = useRef({});
      // ── 更新 (Updates, in About tab) ──
      const [versionInfo, setVersionInfo] = useState(null);
      const [versionLoading, setVersionLoading] = useState(false);
      const [versionError, setVersionError] = useState('');
      const [autoCheckUpdates, setAutoCheckUpdates] = useState(() => {
        try { return JSON.parse(localStorage.getItem('siwu_update_prefs'))?.autoCheck !== false; }
        catch { return true; }
      });
      const [autoInstallUpdates, setAutoInstallUpdates] = useState(() => {
        try { return JSON.parse(localStorage.getItem('siwu_update_prefs'))?.autoInstall === true; }
        catch { return false; }
      });
      const saveUpdatePrefs = useCallback((ac, ai) => {
        try { localStorage.setItem('siwu_update_prefs', JSON.stringify({ autoCheck: ac, autoInstall: ai })); } catch {}
      }, []);

      // ── Build state (dev mode) ──
      const [buildLog, setBuildLog] = useState([]);
      const [buildRunning, setBuildRunning] = useState(false);
      const [buildResult, setBuildResult] = useState(null);
      const [releaseVersion, setReleaseVersion] = useState('');

      // Auto-fill releaseVersion from versionInfo once it loads
      const releaseVersionSeeded = useRef(false);
      useEffect(() => {
        if (!releaseVersionSeeded.current && versionInfo) {
          const v = versionInfo.electron_version || versionInfo.python_version || '';
          if (v) { setReleaseVersion(v); releaseVersionSeeded.current = true; }
        }
      }, [versionInfo]);

      const isElectronShell = typeof window !== 'undefined' && !!(window.siwu);

      const handleBuild = useCallback(async () => {
        setBuildLog([]); setBuildResult(null); setBuildRunning(true);
        try {
          const r = await fetch('/api/v1/setup/build-electron', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ release_version: releaseVersion.trim() }),
          });
          const reader = r.body.getReader();
          const decoder = new TextDecoder();
          let buf = '';
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop();
            for (const line of lines) {
              if (line.startsWith('data: ')) {
                try {
                  const data = JSON.parse(line.slice(6));
                  if (data.type === 'log') {
                    setBuildLog(prev => [...prev, data.line]);
                  } else if (data.type === 'error') {
                    setBuildLog(prev => [...prev, `❌ ${data.message}`]);
                  } else if (data.type === 'status') {
                    // status used for phase transitions, heartbeat for keepalive
                  } else if (data.type === 'result') {
                    setBuildResult(data);
                  }
                } catch {}
              }
            }
          }
        } catch (e) {
          setBuildResult({ ok: false, error: '网络请求失败: ' + (e.message || '') });
        } finally {
          setBuildRunning(false);
        }
      }, [releaseVersion]);

      // ── Load LLM config & models on mount ──
      useEffect(() => {
        fetch('/api/v1/setup/config').then(r => r.json()).then(d => {
          const pk = d.provider_key || 'deepseek';
          setProvider(pk);
          setBaseUrl(d.base_url || PROVIDERS[pk]?.url || '');
          setModel(d.model || PROVIDERS[pk]?.model || '');
          if (d.api_key) {
            providerKeys.current[pk] = d.api_key;
            setApiKey(d.api_key);
          }
        }).catch(() => {});
        fetchModelsForProvider('');
      }, []);

      // ── Sync general state from props on mount ──
      // useState init captures the prop at first render; if the parent's
      // uiSettings arrives later (after server fetch), the dialog won't see
      // it without explicit sync. This effect runs once after mount and
      // pulls the latest prop values, fixing truncated text on restart.
      const syncedRef = useRef(false);
      useEffect(() => {
        if (!syncedRef.current && uiSettings.agent_persona) {
          setPersona(uiSettings.agent_persona);
          setKnowledge(uiSettings.custom_knowledge || '');
          setPhaseModels(uiSettings.phase_models || {});
          setShowThinking(uiSettings.show_thinking_after_answer !== false);
          setMaxIterations(uiSettings.max_iterations || 0);
          setPracticeRounds(uiSettings.practice_rounds || 0);
          setSearchMaxResults(uiSettings.web_search_max_results || 0);
          setFetchMaxUrls(uiSettings.web_fetch_max_urls || 0);
          setFetchMaxCharsPerPage(uiSettings.web_fetch_max_chars_per_page || 0);
          setFetchMaxTotalChars(uiSettings.web_fetch_max_total_chars || 0);
          setFontFamily(uiSettings.font_family || 'system');
          setFontSize(uiSettings.font_size || 'medium');
          setPageZoom(uiSettings.page_zoom || 100);
          syncedRef.current = true;
        }
      }, [uiSettings]);

      // ── Fetch version info when updates tab is opened ──
      const fetchVersionInfo = useCallback(() => {
        setVersionLoading(true); setVersionError('');
        fetch('/api/v1/setup/version').then(r => r.json()).then(d => {
          setVersionInfo(d); setVersionLoading(false);
        }).catch(e => {
          setVersionError('获取版本信息失败: ' + (e.message || '网络错误'));
          setVersionLoading(false);
        });
      }, []);

      // Fetch version info when about tab is opened (if auto-check is on)
      useEffect(() => {
        if (activeTab === 'about' && !versionInfo && !versionLoading && autoCheckUpdates) {
          fetchVersionInfo();
        }
      }, [activeTab, versionInfo, versionLoading, fetchVersionInfo, autoCheckUpdates]);

      const fetchModelsForProvider = useCallback((pk) => {
        const q = pk ? '?provider_key=' + encodeURIComponent(pk) : '';
        fetch('/api/v1/models' + q).then(r => r.json()).then(d => {
          setAccountModels(d.models || []);
        }).catch(() => {});
      }, []);

      const handleProviderChange = useCallback((p) => {
        // Save current key for current provider
        if (apiKey.trim()) {
          providerKeys.current[provider] = apiKey;
        }
        setProvider(p);
        const preset = PROVIDERS[p];
        setBaseUrl(preset.url);
        setModel(preset.model);
        // Restore key for the new provider (or blank if never entered)
        setApiKey(providerKeys.current[p] || '');
        setTestResult(null);
        fetchModelsForProvider(p);
      }, [provider, apiKey, fetchModelsForProvider]);

      // ── Test connection ──
      const handleTest = useCallback(async () => {
        if (!apiKey.trim()) { setTestResult({ ok: false, error: '请先输入 API Key' }); return; }
        setTesting(true); setTestResult(null);
        try {
          const r = await fetch('/api/v1/setup/test', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ provider, base_url: baseUrl, api_key: apiKey, model }),
          });
          const d = await r.json();
          setTestResult(d);
        } catch (e) {
          setTestResult({ ok: false, error: '网络请求失败：' + (e.message || '') });
        } finally { setTesting(false); }
      }, [provider, baseUrl, apiKey, model]);

      // ── Save account config ──
      const handleAccountSave = useCallback(async () => {
        if (!apiKey.trim()) return;
        setAccountSaving(true);
        try {
          await fetch('/api/v1/setup', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ provider, base_url: baseUrl, api_key: apiKey, model }),
          });
          // Remember this key for the current provider
          providerKeys.current[provider] = apiKey;
          fetch('/api/v1/models').then(r => r.json()).catch(() => {});
          setTestResult({ ok: true, latency_ms: 0, model, message: '配置已保存' });
        } catch (e) {
          setTestResult({ ok: false, error: '保存失败：' + (e.message || '') });
        } finally { setAccountSaving(false); }
      }, [provider, baseUrl, apiKey, model]);

      // ── Save general/appearance settings ──
      const handleSave = useCallback(async () => {
        setSaving(true);
        try {
          const body = { font_family: fontFamily, font_size: fontSize, page_zoom: pageZoom, show_thinking_after_answer: showThinking, agent_persona: persona, custom_knowledge: knowledge, phase_models: phaseModels, max_iterations: maxIterations, practice_rounds: practiceRounds, web_search_max_results: searchMaxResults, web_fetch_max_urls: fetchMaxUrls, web_fetch_max_chars_per_page: fetchMaxCharsPerPage, web_fetch_max_total_chars: fetchMaxTotalChars };
          const r = await fetch('/api/v1/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
          if (r.ok) onSave(body);
        } catch {} finally { setSaving(false); }
        onClose();
      }, [fontFamily, fontSize, pageZoom, showThinking, maxIterations, practiceRounds, searchMaxResults, fetchMaxUrls, fetchMaxCharsPerPage, fetchMaxTotalChars, persona, knowledge, phaseModels, onSave, onClose]);

      const applyFont = useCallback((fam, sz) => {
        const f = FONT_FAMILIES.find(x => x.id === fam);
        const s = FONT_SIZES.find(x => x.id === sz);
        document.documentElement.style.setProperty('--app-font', (f || FONT_FAMILIES[0]).css);
        document.documentElement.style.setProperty('--app-font-size', (s || FONT_SIZES[1]).css);
      }, []);

      const handleTabFill = useCallback((e, currentValue, setter) => {
        if (e.key === 'Tab' && !currentValue.trim()) {
          const ph = e.target.placeholder || '';
          const idx = ph.indexOf('例：');
          if (idx >= 0) { e.preventDefault(); setter(ph.slice(idx + 2).trim()); }
          else if (ph) { e.preventDefault(); setter(ph); }
        }
      }, []);

      // ── Dialog resize ──
      const [dlgW, setDlgW] = useState(() => { try { return JSON.parse(localStorage.getItem('siwu_settings_size'))?.w || 560; } catch { return 560; } });
      const [dlgH, setDlgH] = useState(() => { try { return JSON.parse(localStorage.getItem('siwu_settings_size'))?.h || 560; } catch { return 560; } });
      const resizeRef = useRef(null);
      const dlgSizeRef = useRef({ w: 560, h: 560 });
      dlgSizeRef.current = { w: dlgW, h: dlgH };
      const resizeStart = useCallback((edge, e) => {
        e.preventDefault();
        resizeRef.current = { edge, sx: e.clientX, sy: e.clientY, sw: dlgW, sh: dlgH };
        const onMove = (ev) => {
          const r = resizeRef.current; if (!r) return;
          if (r.edge.includes('e')) setDlgW(Math.max(500, r.sw + (ev.clientX - r.sx)));
          if (r.edge.includes('s')) setDlgH(Math.max(400, r.sh + (ev.clientY - r.sy)));
        };
        const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); resizeRef.current = null;
          try { localStorage.setItem('siwu_settings_size', JSON.stringify(dlgSizeRef.current)); } catch {} };
        document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
      }, [dlgW, dlgH]);

      const TABS = [
        { id: 'general', label: '通用', icon: '⚙️' },
        { id: 'appearance', label: '外观', icon: '🎨' },
        { id: 'account', label: '账户', icon: '🔑' },
        { id: 'about', label: '关于', icon: 'ℹ️' },
      ];

      return (
        <div className="fixed inset-0 z-50 flex items-start justify-center pt-[8vh] bg-black/20 overflow-hidden" onClick={onClose}>
          <div className="relative bg-cream rounded-xl border border-linen/60 shadow-2xl p-0 my-8 overflow-hidden flex flex-col" style={{ width: dlgW, height: dlgH, maxWidth: '96vw', maxHeight: '90vh' }} onClick={e => e.stopPropagation()}>
            {/* Resize handles */}
            <div className="absolute top-0 right-0 w-2 h-full cursor-e-resize hover:bg-seal/10 z-10" onMouseDown={e => resizeStart('e', e)} />
            <div className="absolute bottom-0 left-0 w-full h-2 cursor-s-resize hover:bg-seal/10 z-10" onMouseDown={e => resizeStart('s', e)} />
            <div className="absolute bottom-0 right-0 w-4 h-4 cursor-se-resize z-10" onMouseDown={e => resizeStart('se', e)}>
              <svg width="12" height="12" className="absolute bottom-0.5 right-0.5 text-clay/50"><path d="M0 12 L12 0" stroke="currentColor" strokeWidth="1.5"/><path d="M5 12 L12 5" stroke="currentColor" strokeWidth="1.5"/><path d="M10 12 L12 10" stroke="currentColor" strokeWidth="1.5"/></svg>
            </div>
            {/* Header */}
            <div className="px-6 pt-5 pb-3 flex-shrink-0">
              <h2 className="text-lg font-semibold text-ink font-display">设置</h2>
            </div>
            {/* Body: sidebar + content */}
            <div className="flex flex-1 overflow-hidden min-h-0">
              {/* Sidebar */}
              <div className="w-32 flex-shrink-0 border-r border-clay/20 flex flex-col py-2 bg-cream/50">
                {TABS.map(t => (
                  <button key={t.id} onClick={() => setActiveTab(t.id)}
                    className={'px-3 py-2.5 text-xs font-medium text-left transition-colors border-l-2 ' + (activeTab === t.id ? 'border-seal text-seal bg-seal-wash/50' : 'border-transparent text-warmgray hover:text-ink hover:bg-clay/10')}>
                    <span className="mr-1.5">{t.icon}</span>{t.label}
                  </button>
                ))}
              </div>
              {/* Content */}
              <div className="flex-1 overflow-y-auto px-5 py-4 scrollbar-thin">
              {/* ═══ 通用 ═══ */}
              {activeTab === 'general' && (
                <div className="space-y-5">
                  {/* Agent 角色 */}
                  <div>
                    <div className="text-sm font-medium text-ink mb-1.5">Agent 角色设定</div>
                    <div className="text-xs text-warmgray mb-2">设定 Agent 的身份、语气、思维倾向与行为准则。会被注入到每一轮认知循环中。</div>
                    <textarea value={persona} onChange={e => setPersona(e.target.value)} onKeyDown={e => handleTabFill(e, persona, setPersona)}
                      className="w-full h-32 px-3 py-2 rounded-lg border border-clay/30 bg-white text-sm text-ink placeholder-warmgray resize-y focus:outline-none focus:ring-2 focus:ring-seal/20"
                      placeholder="例：你是一个严谨的分析助手，以马克思主义政治经济学为框架思考问题。优先使用数据和逻辑论证，避免主观臆断。回答风格简练。" />
                  </div>
                  {/* 知识/经验 */}
                  <div>
                    <div className="text-sm font-medium text-ink mb-1.5">重要知识 / 经验</div>
                    <div className="text-xs text-warmgray mb-2">用户想长期保存的关键信息、背景知识或行为偏好。Agent 在处理问题时会参考这些内容。</div>
                    <textarea value={knowledge} onChange={e => setKnowledge(e.target.value)} onKeyDown={e => handleTabFill(e, knowledge, setKnowledge)}
                      className="w-full h-32 px-3 py-2 rounded-lg border border-clay/30 bg-white text-sm text-ink placeholder-warmgray resize-y focus:outline-none focus:ring-2 focus:ring-seal/20"
                      placeholder="例：我是一名独立开发者，关注 AI 基础设施方向。团队使用 React + Python FastAPI 技术栈。代码注释和文档要求使用中文。" />
                  </div>
                  {/* 显示思维过程 */}
                  <div>
                    <div className="text-sm font-medium text-ink mb-1.5">已回答问题的思维过程</div>
                    <div className="text-xs text-warmgray mb-2">Agent 回答后，是否在回答上方保留可展开的认知过程。关闭后界面更简洁。</div>
                    <label className="flex items-center gap-3 cursor-pointer" onClick={() => setShowThinking(!showThinking)}>
                      <div className={'relative w-10 h-5 rounded-full transition-colors ' + (showThinking ? 'bg-olive' : 'bg-clay')}>
                        <div className={'absolute top-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform ' + (showThinking ? 'left-5' : 'left-0.5')} />
                      </div>
                      <span className="text-xs text-warmgray">{showThinking ? '显示' : '隐藏'}</span>
                    </label>
                  </div>
                  {/* 智能路由 · 阶段模型 */}
                  <div>
                    <div className="text-sm font-medium text-ink mb-1.5">智能路由 · 阶段模型</div>
                    <div className="text-xs text-warmgray mb-2">当顶部模型选择为"智能路由"时，各认知阶段使用的模型。留空则使用默认模型。</div>
                    <div className="grid grid-cols-2 gap-2">
                      {PHASES.map(p => (
                        <div key={p.id} className="flex items-center gap-2">
                          <span className="text-xs text-warmgray flex-shrink-0 whitespace-nowrap" style={{minWidth:'72px'}}>{p.icon} {p.label}</span>
                          <select value={phaseModels[p.id] || ''} onChange={e => {
                            const v = e.target.value;
                            setPhaseModels(prev => { if (v) return { ...prev, [p.id]: v }; const next = { ...prev }; delete next[p.id]; return next; });
                          }} className="flex-1 bg-paper border border-linen/40 rounded px-2 py-1 text-xs text-ink focus:outline-none focus:border-seal/40">
                            <option value="">默认</option>
                            {availableModels.filter(m => m !== '智能路由').map(m => <option key={m} value={m}>{m}</option>)}
                          </select>
                        </div>
                      ))}
                    </div>
                  </div>
                  {/* 高级运行时参数 */}
                  <div>
                    <div className="text-sm font-medium text-ink mb-1.5">⚙️ 高级参数</div>
                    <div className="text-xs text-warmgray mb-2">调整运行时行为。设为 0 则使用 config.toml 默认值。保存后下次提问生效。</div>
                    <div className="grid grid-cols-2 gap-x-4 gap-y-3">
                      <div className="flex items-center gap-2"><span className="text-xs text-warmgray w-24 flex-shrink-0">最大迭代次数</span>
                        <input type="number" min="0" max="20" value={maxIterations} onChange={e => setMaxIterations(parseInt(e.target.value)||0)} className="w-16 bg-paper border border-linen/40 rounded px-2 py-1 text-xs text-ink focus:outline-none focus:border-seal/40" /></div>
                      <div className="flex items-center gap-2"><span className="text-xs text-warmgray w-24 flex-shrink-0">实践实验轮数</span>
                        <input type="number" min="0" max="10" value={practiceRounds} onChange={e => setPracticeRounds(parseInt(e.target.value)||0)} className="w-16 bg-paper border border-linen/40 rounded px-2 py-1 text-xs text-ink focus:outline-none focus:border-seal/40" /></div>
                      <div className="flex items-center gap-2"><span className="text-xs text-warmgray w-24 flex-shrink-0">搜索最大结果</span>
                        <input type="number" min="0" max="30" value={searchMaxResults} onChange={e => setSearchMaxResults(parseInt(e.target.value)||0)} className="w-16 bg-paper border border-linen/40 rounded px-2 py-1 text-xs text-ink focus:outline-none focus:border-seal/40" /></div>
                      <div className="flex items-center gap-2"><span className="text-xs text-warmgray w-24 flex-shrink-0">抓取最大URL</span>
                        <input type="number" min="0" max="20" value={fetchMaxUrls} onChange={e => setFetchMaxUrls(parseInt(e.target.value)||0)} className="w-16 bg-paper border border-linen/40 rounded px-2 py-1 text-xs text-ink focus:outline-none focus:border-seal/40" /></div>
                      <div className="flex items-center gap-2"><span className="text-xs text-warmgray w-24 flex-shrink-0">单页最大字符</span>

    // ── Provider presets ─────────────────────────────────────

      deepseek:  { label: 'DeepSeek',     url: 'https://api.deepseek.com',         model: 'deepseek-v4-pro' },

      anthropic: { label: 'Anthropic Claude', url: 'https://api.anthropic.com',    model: 'claude-sonnet-4-5' },
      ollama:    { label: 'Ollama 本地',  url: 'http://localhost:11434/v1',         model: 'llama3' },
      custom:    { label: '自定义 / 中转站', url: '',                                 model: '' },
    };

    // ── SetupScreen ──────────────────────────────────────────
    function SetupScreen({ onConfigured }) {
      const [provider, setProvider] = useState('deepseek');
      const [baseUrl, setBaseUrl] = useState(PROVIDERS.deepseek.url);
      const [apiKey, setApiKey] = useState('');
      const [model, setModel] = useState(PROVIDERS.deepseek.model);
      const [saving, setSaving] = useState(false);
      const [error, setError] = useState('');
      const [showKey, setShowKey] = useState(false);

      const handleProviderChange = useCallback((p) => {
        setProvider(p); setBaseUrl(PROVIDERS[p].url); setModel(PROVIDERS[p].model); setError('');
      }, []);
      const handleTabFill = useCallback((e, currentValue, setter) => {
        if (e.key === 'Tab' && !currentValue.trim()) {
          const ph = e.target.placeholder || '';
          if (ph) { e.preventDefault(); setter(ph); }
        }
      }, []);
      const handleSave = useCallback(async () => {
        if (!apiKey.trim()) { setError('请输入 API Key'); return; }
        setSaving(true); setError('');
        try {
          const res = await fetch('/api/v1/setup', { method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ provider, base_url: baseUrl, api_key: apiKey, model }) });
          if (!res.ok) { const d = await res.json(); throw new Error(d.detail || '保存失败'); }
          onConfigured();
        } catch (err) { setError(err.message); } finally { setSaving(false); }
      }, [apiKey, provider, baseUrl, model, onConfigured]);

      return (
        <div className="min-h-screen bg-paper flex items-center justify-center p-8">
