version: "3.9"

services:
  siwu:
    image: ghcr.io/${GITHUB_REPOSITORY:-siwu-agent}:latest
    build: .
    container_name: siwu-agent
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./workspace:/app/workspace
      - ./logs:/app/logs
      - ./config.toml:/app/config.toml:ro
    environment:
      - SIWU_LLM_API_KEY=${SIWU_LLM_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/setup/status"]
      interval: 30s
      timeout: 5s
      retries: 3
